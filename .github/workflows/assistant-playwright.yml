name: Assistant Playwright Journeys

on:
  schedule:
    - cron: '23 8 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional base URL for full assistant Playwright journeys
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: assistant-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  journeys:
    name: Full Assistant Playwright Journeys
    runs-on: ubuntu-latest
    env:
      INPUT_BASE_URL: ${{ inputs.base_url || '' }}
      CONFIGURED_BASE_URL: ${{ vars.ILAS_PLAYWRIGHT_BASE_URL || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve Playwright base URL
        id: base_url
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${INPUT_BASE_URL:-}"
          if [[ -z "$BASE_URL" ]]; then
            BASE_URL="${CONFIGURED_BASE_URL:-}"
          fi

          if [[ -z "$BASE_URL" ]]; then
            echo "::warning::Skipping full assistant Playwright journeys because no base URL was provided. Set vars.ILAS_PLAYWRIGHT_BASE_URL or pass workflow_dispatch input base_url."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "PLAYWRIGHT_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "::notice::Running full assistant Playwright journeys against $BASE_URL"

      - name: Install Playwright Chromium
        if: ${{ steps.base_url.outputs.should_run == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run full assistant Playwright journeys
        if: ${{ steps.base_url.outputs.should_run == 'true' }}
        run: npm run test:assistant:playwright:journeys

      - name: Upload assistant Playwright artifacts
        if: ${{ always() && steps.base_url.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assistant-playwright-artifacts
          path: output/playwright/**
          if-no-files-found: warn
