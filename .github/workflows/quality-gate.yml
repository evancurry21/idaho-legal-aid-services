name: Quality Gate

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_PROMPTFOO_ENV: dev

jobs:
  quality-gate:
    name: PHPUnit Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          extensions: dom, curl, mbstring, zip, pdo, pdo_mysql, gd
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit pure-unit tests (VC-PURE)
        run: vendor/bin/phpunit -c phpunit.pure.xml --colors=always

      - name: Run PHPUnit drupal-unit tests (VC-DRUPAL-UNIT)
        run: vendor/bin/phpunit -c phpunit.xml --testsuite drupal-unit --colors=always

      - name: Run full quality gate (golden transcript only)
        run: bash web/modules/custom/ilas_site_assistant/tests/run-quality-gate.sh --skip-phpunit

      - name: Upload PHPUnit summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phpunit-summary
          path: promptfoo-evals/output/phpunit-summary.txt
          if-no-files-found: warn

  promptfoo-gate:
    name: Promptfoo Gate
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run UX/a11y widget hardening suite (P3-EXT-01)
        run: node web/modules/custom/ilas_site_assistant/tests/js/run-assistant-widget-hardening.mjs

      - name: Run promptfoo transport/runtime tests
        run: npm run test:promptfoo:runtime

      - name: Run promptfoo gate (real hosted helper-PR/protected-push checks)
        env:
          ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL }}
          ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE }}
          ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR }}
          CI_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="${CI_BRANCH}"
          EVENT_NAME="${{ github.event_name }}"
          TARGET_ENV="${CI_PROMPTFOO_ENV}"
          HELPER_PR_BLOCKING="false"
          PROTECTED_PUSH_BLOCKING="false"
          if [[ "$EVENT_NAME" == "pull_request" && ( "$BRANCH" == "publish/master-active" || "$BRANCH" =~ ^publish/master- ) ]]; then
            HELPER_PR_BLOCKING="true"
          fi
          if [[ "$EVENT_NAME" == "push" && ( "$BRANCH" == "master" || "$BRANCH" =~ ^release/ ) ]]; then
            PROTECTED_PUSH_BLOCKING="true"
          fi
          if [[ "$HELPER_PR_BLOCKING" == "true" || "$PROTECTED_PUSH_BLOCKING" == "true" ]]; then
            if [[ -z "${ILAS_ASSISTANT_URL:-}" ]]; then
              echo "::error::ILAS_ASSISTANT_URL secret is required for blocking hosted Promptfoo checks (publish/master-active helper PRs and master/release/* pushes)."
              exit 1
            fi
            if [[ "$HELPER_PR_BLOCKING" == "true" ]]; then
              echo "::notice::Running real hosted helper-PR promptfoo check against ILAS_ASSISTANT_URL in blocking mode."
              bash scripts/ci/run-promptfoo-gate.sh \
                --env "$TARGET_ENV" \
                --mode blocking \
                --config promptfooconfig.hosted.yaml \
                --no-deep-eval
            else
              echo "::notice::Running real hosted protected-push stability check against ILAS_ASSISTANT_URL in blocking mode."
              RAG_METRIC_MIN_COUNT=2 \
              P2DEL04_METRIC_MIN_COUNT=2 \
              bash scripts/ci/run-promptfoo-gate.sh \
                --env "$TARGET_ENV" \
                --mode blocking \
                --config promptfooconfig.protected-push.yaml \
                --no-deep-eval
            fi
          elif [[ -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            echo "::notice::Running real hosted promptfoo check against ILAS_ASSISTANT_URL in advisory mode."
            bash scripts/ci/run-promptfoo-gate.sh \
              --env "$TARGET_ENV" \
              --mode advisory \
              --config promptfooconfig.hosted.yaml \
              --no-deep-eval
          else
            if [[ "$BRANCH" == "master" || "$BRANCH" =~ ^release/ ]]; then
              echo "::error::ILAS_ASSISTANT_URL secret is required for blocking branches (master/release/*)."
              exit 1
            fi
            echo "::warning::ILAS_ASSISTANT_URL missing; running simulated promptfoo gate in advisory mode only (not deploy-proof)."
            bash scripts/ci/run-promptfoo-gate.sh \
              --env "$TARGET_ENV" \
              --mode advisory \
              --config promptfooconfig.hosted.yaml \
              --no-deep-eval \
              --skip-eval \
              --simulate-pass-rate 100
          fi

      - name: Annotate advisory vs blocking result
        if: always()
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && ( "$BRANCH" == "publish/master-active" || "$BRANCH" =~ ^publish/master- ) ]] || [[ "$EVENT_NAME" == "push" && ( "$BRANCH" == "master" || "$BRANCH" =~ ^release/ ) ]]; then
            echo "::notice::Promptfoo gate ran in BLOCKING mode for branch $BRANCH as a hosted GitHub check"
          else
            echo "::notice::Promptfoo gate ran in ADVISORY mode for branch $BRANCH as a hosted GitHub check"
          fi

      - name: Upload Promptfoo artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: promptfoo-gate-artifacts
          path: |
            promptfoo-evals/output/gate-summary.txt
            promptfoo-evals/output/results.json
            promptfoo-evals/output/results-smoke.json
            promptfoo-evals/output/results-deep.json
            promptfoo-evals/output/structured-error-summary.json
            promptfoo-evals/output/structured-error-summary.txt
          if-no-files-found: warn

      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gate-summary
          path: promptfoo-evals/output/gate-summary.txt
          if-no-files-found: warn
