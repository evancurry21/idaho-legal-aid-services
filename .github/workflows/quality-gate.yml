name: Quality Gate

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'
  workflow_dispatch:
    inputs:
      target_env:
        description: Pantheon/local target environment for hosted assistant checks
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - live
      assistant_base_url:
        description: Optional base URL for manual smoke checks, for example https://dev-idaholegalaid.pantheonsite.io
        required: false
        default: ''
      run_assistant_path_gate:
        description: Run the assistant-path PR quality gate manually
        required: false
        default: true
        type: boolean
      run_hosted_promptfoo:
        description: Run hosted/live Promptfoo primary suite and production-safe smoke
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_PROMPTFOO_ENV: ${{ vars.CI_PROMPTFOO_ENV || 'dev' }}

jobs:
  detect-assistant-changes:
    name: Detect Assistant Path Changes
    runs-on: ubuntu-latest
    outputs:
      assistant_changed: ${{ steps.detect.outputs.assistant_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect assistant-related paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "assistant_changed=true" >> "$GITHUB_OUTPUT"
            printf 'workflow_dispatch\n' > assistant-changed-files.txt
            echo "::notice::Assistant quality gate enabled by workflow_dispatch."
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$CURRENT_SHA"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > assistant-changed-files.txt

          ASSISTANT_PATH_PATTERN='^(web/modules/custom/ilas_site_assistant/|promptfoo-evals/|scripts/smoke/|scripts/ci/.*(assistant|promptfoo|vector|smoke).*|\.github/workflows/|playwright\.config\.js|package(-lock)?\.json|config/ilas_site_assistant\.settings\.yml|config/ai_vdb_provider_pinecone\.settings\.yml|config/search_api\.(index|server)\..*\.yml|config/key\.key\.(cohere|pinecone|voyage).*\.yml|web/sites/default/settings\.php)'

          if grep -E "$ASSISTANT_PATH_PATTERN" assistant-changed-files.txt >/dev/null; then
            echo "assistant_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Assistant-related changes detected."
          else
            echo "assistant_changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No assistant-related changes detected."
          fi

          echo "Changed files:"
          sed 's/^/  /' assistant-changed-files.txt

      - name: Upload assistant path detection artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assistant-changed-files
          path: assistant-changed-files.txt
          if-no-files-found: warn

  static-analysis:
    name: PHP Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          extensions: dom, curl, mbstring, zip, pdo, pdo_mysql, gd
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP_CodeSniffer (Drupal + DrupalPractice)
        run: composer phpcs

      - name: Run PHPStan (Drupal extension, custom code only)
        run: composer phpstan

  quality-gate:
    name: Basic Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          extensions: dom, curl, mbstring, zip, pdo, pdo_mysql, gd
          coverage: none

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Run PHPUnit pure/unit classifier and safety tests
        run: vendor/bin/phpunit -c phpunit.pure.xml --colors=always

      - name: Run PHPUnit DrupalUnit tests
        run: vendor/bin/phpunit -c phpunit.xml --testsuite drupal-unit --colors=always

      - name: Run UX/a11y widget hardening suite (P3-EXT-01)
        run: node web/modules/custom/ilas_site_assistant/tests/js/run-assistant-widget-hardening.mjs

      - name: Run provider/runtime harness and golden checks
        run: bash web/modules/custom/ilas_site_assistant/tests/run-quality-gate.sh --profile basic --skip-phpunit

      - name: Upload basic gate summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: basic-quality-gate-summary
          path: promptfoo-evals/output/phpunit-summary.txt
          if-no-files-found: warn

  assistant-playwright-smoke:
    name: Assistant Mocked Playwright Smoke
    runs-on: ubuntu-latest
    needs:
      - detect-assistant-changes
    if: ${{ github.event_name == 'pull_request' && needs.detect-assistant-changes.outputs.assistant_changed == 'true' }}
    env:
      ASSISTANT_BASE_URL: ${{ secrets.ASSISTANT_BASE_URL || vars.ASSISTANT_BASE_URL }}
      ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL || vars.ILAS_ASSISTANT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Check Playwright dependency
        id: playwright_dependency
        shell: bash
        run: |
          set -euo pipefail
          if node -e "require.resolve('@playwright/test')" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping assistant Playwright smoke because @playwright/test is not installed."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize Playwright base URL
        if: ${{ steps.playwright_dependency.outputs.available == 'true' }}
        run: |
          set -euo pipefail

          if [[ -z "${ASSISTANT_BASE_URL:-}" && -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            ASSISTANT_BASE_URL="${ILAS_ASSISTANT_URL%/assistant/api/message}"
          fi

          if [[ -z "${ASSISTANT_BASE_URL:-}" ]]; then
            echo "::error file=.github/workflows/quality-gate.yml::Assistant mocked Playwright smoke requires ASSISTANT_BASE_URL or ILAS_ASSISTANT_URL for the Drupal page under test."
            exit 1
          fi

          echo "PLAYWRIGHT_BASE_URL=$ASSISTANT_BASE_URL" >> "$GITHUB_ENV"
          echo "::notice::Assistant mocked Playwright smoke provider mode=mocked-api page_base_url=$ASSISTANT_BASE_URL"

      - name: Install Playwright Chromium for assistant smoke
        if: ${{ steps.playwright_dependency.outputs.available == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run mocked assistant Playwright smoke
        if: ${{ steps.playwright_dependency.outputs.available == 'true' }}
        run: npm run test:assistant:playwright:mocked-smoke

      - name: Upload assistant Playwright smoke artifacts
        if: ${{ always() && steps.playwright_dependency.outputs.available == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assistant-playwright-smoke-artifacts
          path: output/playwright/**
          if-no-files-found: warn

  a11y-gate:
    name: Accessibility Gate (axe-core)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    env:
      A11Y_BASE_URL: ${{ secrets.A11Y_BASE_URL || vars.A11Y_BASE_URL || secrets.ASSISTANT_BASE_URL || vars.ASSISTANT_BASE_URL }}
      ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL || vars.ILAS_ASSISTANT_URL }}
      A11Y_ROUTE_HOME: ${{ vars.A11Y_ROUTE_HOME || '/' }}
      A11Y_ROUTE_IMPACT_CARDS: ${{ vars.A11Y_ROUTE_IMPACT_CARDS || '/' }}
      A11Y_ROUTE_RESOURCES: ${{ vars.A11Y_ROUTE_RESOURCES || '/legal-help/housing' }}
      # /assistant has known legacy color-contrast violations; opt-in only.
      A11Y_ROUTE_ASSISTANT: ${{ vars.A11Y_ROUTE_ASSISTANT || '' }}
      A11Y_ROUTE_STANDARD: ${{ vars.A11Y_ROUTE_STANDARD || '/what-we-do/resources' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve a11y base URL
        id: resolve_a11y_base_url
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${A11Y_BASE_URL:-}" && -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            A11Y_BASE_URL="${ILAS_ASSISTANT_URL%/assistant/api/message}"
          fi

          if [[ -z "${A11Y_BASE_URL:-}" ]]; then
            echo "::warning file=.github/workflows/quality-gate.yml::Skipping a11y gate: no A11Y_BASE_URL or ASSISTANT_BASE_URL configured. Set repo var/secret A11Y_BASE_URL to enable."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PLAYWRIGHT_BASE_URL=$A11Y_BASE_URL" >> "$GITHUB_ENV"
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "::notice::a11y gate target=$A11Y_BASE_URL"

      - name: Install Playwright Chromium for a11y gate
        if: ${{ steps.resolve_a11y_base_url.outputs.available == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        if: ${{ steps.resolve_a11y_base_url.outputs.available == 'true' }}
        # Hosted gate covers post-deploy, deploy-state checks (axe color
        # contrast, landmarks, headings, etc.) on whatever the deployed
        # environment currently serves. Commit-aware structural specs
        # (impact-card.spec.js) are owned by a11y-local-gate below, which
        # builds Drupal from this PR's commit; running them here would
        # spuriously fail when the deployed env hasn't received the PR yet.
        run: npm run test:a11y -- tests/a11y/axe.spec.js

      - name: Upload a11y gate artifacts
        if: ${{ always() && steps.resolve_a11y_base_url.outputs.available == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-gate-artifacts
          path: output/playwright-a11y/**
          if-no-files-found: warn

  a11y-local-gate:
    # Commit-aware accessibility gate. Builds a Drupal site from the checked-out
    # commit inside DDEV and runs the a11y suite against it. Required on PR.
    # The deployed-target a11y-gate above remains a post-deploy smoke against
    # whatever Pantheon dev is currently serving.
    name: Accessibility Gate (local DDEV)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install host npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Set up DDEV
        uses: ddev/github-action-setup-ddev@fdf2f5c97943bae638f31df6df86f1defa6210c0 # v1.12.1
        with:
          autostart: 'false'

      - name: Build Drupal site from this commit
        run: bash scripts/ci/setup-a11y-local.sh

      - name: Run accessibility tests against local DDEV
        env:
          PLAYWRIGHT_BASE_URL: ''
          A11Y_ROUTE_HOME: '/'
          A11Y_ROUTE_IMPACT_CARDS: '/'
          A11Y_ROUTE_RESOURCES: ''
          A11Y_ROUTE_ASSISTANT: ''
          A11Y_ROUTE_STANDARD: ''
        run: npm run test:a11y -- tests/a11y/axe.spec.js tests/a11y/impact-card.spec.js

      - name: Upload local a11y gate artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-local-gate-artifacts
          path: output/playwright-a11y/**
          if-no-files-found: warn

      - name: Capture DDEV diagnostics on failure
        if: ${{ failure() }}
        run: |
          ddev describe || true
          ddev logs --tail 200 || true
          ddev drush watchdog:show --count=50 --severity=Error --extended || true

  assistant-pr-gate:
    name: Assistant PR Quality Gate
    runs-on: ubuntu-latest
    needs:
      - detect-assistant-changes
      - quality-gate
    if: >-
      ${{
        (github.event_name == 'pull_request' && needs.detect-assistant-changes.outputs.assistant_changed == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.run_assistant_path_gate == true)
      }}
    env:
      ASSISTANT_BASE_URL: ${{ inputs.assistant_base_url || secrets.ASSISTANT_BASE_URL || vars.ASSISTANT_BASE_URL }}
      ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL || vars.ILAS_ASSISTANT_URL }}
      ASSISTANT_TARGET_ENV: ${{ inputs.target_env || vars.ASSISTANT_PR_TARGET_ENV || vars.CI_PROMPTFOO_ENV || 'dev' }}
      ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE }}
      ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
          extensions: dom, curl, mbstring, zip, pdo, pdo_mysql, gd
          coverage: none

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Set up DDEV for functional API behavior tests
        uses: ddev/github-action-setup-ddev@fdf2f5c97943bae638f31df6df86f1defa6210c0 # v1.12.1

      - name: Ensure DDEV Composer dependencies
        run: ddev composer install --no-interaction --no-progress --prefer-dist

      - name: Normalize assistant endpoint
        run: |
          set -euo pipefail

          if [[ -z "${ASSISTANT_BASE_URL:-}" && -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            ASSISTANT_BASE_URL="${ILAS_ASSISTANT_URL%/assistant/api/message}"
          fi
          if [[ -z "${ILAS_ASSISTANT_URL:-}" && -n "${ASSISTANT_BASE_URL:-}" ]]; then
            ILAS_ASSISTANT_URL="${ASSISTANT_BASE_URL%/}/assistant/api/message"
          fi

          if [[ -z "${ASSISTANT_BASE_URL:-}" || -z "${ILAS_ASSISTANT_URL:-}" ]]; then
            echo "::error file=.github/workflows/quality-gate.yml::Assistant-path PR gate requires ASSISTANT_BASE_URL or ILAS_ASSISTANT_URL pointing at a local/test assistant. Simulated Promptfoo cannot satisfy this blocking gate."
            exit 1
          fi

          {
            echo "ASSISTANT_BASE_URL=$ASSISTANT_BASE_URL"
            echo "PLAYWRIGHT_BASE_URL=$ASSISTANT_BASE_URL"
            echo "ILAS_ASSISTANT_URL=$ILAS_ASSISTANT_URL"
            echo "CI_PROMPTFOO_ENV=${ASSISTANT_TARGET_ENV:-dev}"
          } >> "$GITHUB_ENV"

          echo "::notice::Assistant PR quality suites: selected kernel retrieval/grounding, functional API behavior, Promptfoo quality mini-suite, production-safe smoke, mocked Playwright widget subset."
          echo "::notice::Assistant provider target: mode=real endpoint=$ILAS_ASSISTANT_URL target_env=${ASSISTANT_TARGET_ENV:-dev}"

      - name: Run selected kernel and functional assistant tests
        env:
          ASSISTANT_FUNCTIONAL_MODE: ddev
        run: bash web/modules/custom/ilas_site_assistant/tests/run-quality-gate.sh --profile assistant-pr --skip-phpunit

      - name: Run production-safe assistant smoke
        run: ASSISTANT_SMOKE_MODE=production-safe ASSISTANT_SMOKE_ENV="$CI_PROMPTFOO_ENV" npm run test:assistant:smoke

      - name: Run Promptfoo quality mini-suite
        run: |
          set -euo pipefail
          bash scripts/ci/run-promptfoo-gate.sh \
            --env "$CI_PROMPTFOO_ENV" \
            --mode blocking \
            --config promptfooconfig.quality.yaml \
            --no-deep-eval

      - name: Upload assistant PR quality artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assistant-pr-quality-artifacts
          path: |
            promptfoo-evals/output/phpunit-summary.txt
            promptfoo-evals/output/gate-summary.txt
            promptfoo-evals/output/results.json
            promptfoo-evals/output/results-smoke.json
            promptfoo-evals/output/structured-error-summary.json
            promptfoo-evals/output/structured-error-summary.txt
            output/playwright/report
            output/playwright/test-results
          if-no-files-found: warn

  hosted-manual-gate:
    name: Hosted Manual Assistant Gate
    runs-on: ubuntu-latest
    needs: quality-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hosted_promptfoo == true }}
    env:
      ASSISTANT_BASE_URL: ${{ inputs.assistant_base_url || secrets.ASSISTANT_BASE_URL || vars.ASSISTANT_BASE_URL }}
      ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL || vars.ILAS_ASSISTANT_URL }}
      TARGET_ENV: ${{ inputs.target_env }}
      ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE }}
      ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Normalize hosted assistant endpoint
        run: |
          set -euo pipefail

          if [[ -z "${ASSISTANT_BASE_URL:-}" && -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            ASSISTANT_BASE_URL="${ILAS_ASSISTANT_URL%/assistant/api/message}"
          fi
          if [[ -z "${ILAS_ASSISTANT_URL:-}" && -n "${ASSISTANT_BASE_URL:-}" ]]; then
            ILAS_ASSISTANT_URL="${ASSISTANT_BASE_URL%/}/assistant/api/message"
          fi

          if [[ -z "${ASSISTANT_BASE_URL:-}" || -z "${ILAS_ASSISTANT_URL:-}" ]]; then
            echo "::error file=.github/workflows/quality-gate.yml::Hosted manual gate requires assistant_base_url, ASSISTANT_BASE_URL, or ILAS_ASSISTANT_URL."
            exit 1
          fi

          {
            echo "ASSISTANT_BASE_URL=$ASSISTANT_BASE_URL"
            echo "ILAS_ASSISTANT_URL=$ILAS_ASSISTANT_URL"
            echo "CI_PROMPTFOO_ENV=$TARGET_ENV"
          } >> "$GITHUB_ENV"

          echo "::notice::Hosted/manual assistant gate provider mode=real target_env=$TARGET_ENV endpoint=$ILAS_ASSISTANT_URL"

      - name: Run hosted/live Promptfoo primary suite
        run: |
          set -euo pipefail
          bash scripts/ci/run-promptfoo-gate.sh \
            --env "$TARGET_ENV" \
            --mode blocking \
            --config promptfooconfig.hosted.yaml \
            --no-deep-eval

      - name: Run production-safe smoke and denial checks
        run: ASSISTANT_SMOKE_MODE=production-safe ASSISTANT_SMOKE_ENV="$TARGET_ENV" npm run test:assistant:smoke

      - name: Run vector provenance smoke
        run: node scripts/ci/run-vector-provenance-smoke.js --environment "$TARGET_ENV"

      - name: Upload hosted manual gate artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hosted-manual-gate-artifacts
          path: |
            promptfoo-evals/output/gate-summary.txt
            promptfoo-evals/output/results.json
            promptfoo-evals/output/results-smoke.json
            promptfoo-evals/output/structured-error-summary.json
            promptfoo-evals/output/structured-error-summary.txt
            promptfoo-evals/output/vector-provenance-smoke.jsonl
          if-no-files-found: warn
