name: Quality Gate

on:
  push:
    branches:
      - master
      - main
      - 'release/**'
  pull_request:
    branches:
      - master
      - main
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: PHPUnit Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, mbstring, zip, pdo, pdo_mysql, gd
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit pure-unit tests (VC-UNIT)
        run: vendor/bin/phpunit -c phpunit.pure.xml --colors=always

      - name: Run PHPUnit drupal-unit tests (VC-DRUPAL-UNIT)
        run: vendor/bin/phpunit -c phpunit.xml --testsuite drupal-unit --colors=always

      - name: Run full quality gate (golden transcript only)
        run: bash web/modules/custom/ilas_site_assistant/tests/run-quality-gate.sh --skip-phpunit

      - name: Upload PHPUnit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-summary
          path: promptfoo-evals/output/phpunit-summary.txt
          if-no-files-found: warn

  promptfoo-gate:
    name: Promptfoo Gate
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run UX/a11y widget hardening suite (P3-EXT-01)
        run: node web/modules/custom/ilas_site_assistant/tests/js/run-assistant-widget-hardening.mjs

      - name: Run promptfoo transport/runtime tests
        run: npm run test:promptfoo:runtime

      - name: Run promptfoo gate (real eval when ILAS_ASSISTANT_URL is configured)
        env:
          ILAS_ASSISTANT_URL: ${{ secrets.ILAS_ASSISTANT_URL }}
          ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_MINUTE }}
          ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR: ${{ vars.ILAS_CONFIGURED_RATE_LIMIT_PER_HOUR }}
          CI_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          if [[ -n "${ILAS_ASSISTANT_URL:-}" ]]; then
            echo "::notice::Running real promptfoo eval against ILAS_ASSISTANT_URL"
            bash scripts/ci/run-promptfoo-gate.sh \
              --env dev \
              --mode auto
          else
            if [[ "$BRANCH" == "master" || "$BRANCH" == "main" || "$BRANCH" =~ ^release/ ]]; then
              echo "::error::ILAS_ASSISTANT_URL secret is required for blocking branches (master/main/release/*)."
              exit 1
            fi
            echo "::warning::ILAS_ASSISTANT_URL missing; running simulated promptfoo gate."
            bash scripts/ci/run-promptfoo-gate.sh \
              --env dev \
              --mode auto \
              --skip-eval \
              --simulate-pass-rate 100
          fi

      - name: Annotate advisory vs blocking result
        if: always()
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "master" || "$BRANCH" == "main" || "$BRANCH" =~ ^release/ ]]; then
            echo "::notice::Promptfoo gate ran in BLOCKING mode for branch $BRANCH"
          else
            echo "::notice::Promptfoo gate ran in ADVISORY mode for branch $BRANCH"
          fi

      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-summary
          path: promptfoo-evals/output/gate-summary.txt
          if-no-files-found: warn
