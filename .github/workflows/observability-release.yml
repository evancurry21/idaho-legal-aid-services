name: Observability Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Pantheon deployment identifier or release name'
        required: true
        type: string

permissions:
  contents: read

jobs:
  sentry-release:
    name: Prepare Sentry Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/themes/custom/b5subtheme/package-lock.json

      - name: Install theme dependencies
        working-directory: web/themes/custom/b5subtheme
        run: npm ci

      - name: Build theme assets with source maps
        working-directory: web/themes/custom/b5subtheme
        run: npm run prod

      - name: Prepare Sentry release + sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG_SLUG: ${{ vars.SENTRY_ORG_SLUG }}
          SENTRY_PROJECT_SLUG_BROWSER: ${{ vars.SENTRY_PROJECT_SLUG_BROWSER }}
          SENTRY_RELEASE: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          bash scripts/observability/sentry-release.sh --release "${SENTRY_RELEASE}"
