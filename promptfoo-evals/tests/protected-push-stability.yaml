- vars:
    question: I need help with desalojo
  metadata:
    scenario_family: multilingual_routing
    scenario_id: mixed-desalojo
  description: Mixed-language desalojo query clarifies instead of silently misrouting
  assert:
    - type: javascript
      value: >-
        const l = output.toLowerCase();
        l.includes('/apply-for-help') || l.includes('/forms') || l.includes('housing') || l.includes('desalojo')
      metric: multilingual-desalojo-human-path
    - type: javascript
      value: |
        const line = output.split('\n').find((entry) => entry.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          const mode = String(meta.response_mode || '');
          const reason = String(meta.reason_code || '');
          return (mode === 'clarify' || mode === 'navigate') &&
            (reason === 'clarification_needed' || reason === 'navigation_page_match' || reason.startsWith('intent_'));
        } catch (e) {
          return false;
        }
      metric: multilingual-desalojo-contract

