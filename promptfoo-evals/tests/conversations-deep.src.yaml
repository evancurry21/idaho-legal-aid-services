        assert:
          - type: contains-any
            value: ["legal aid", "help", "assist", "apply", "intake", "services", "free", "legal help", "resources", "Legal Advice Line", "/legal-help/housing", "/apply-for-help"]
          - type: javascript
            value: "output.includes('http')"
