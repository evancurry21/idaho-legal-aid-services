  # ─────────────────────────────────────────────────────────────────────
  # A1. Housing — 3-day notice panic → dispute → court → lockout
  # ─────────────────────────────────────────────────────────────────────
  - id: housing-eviction-3day
    theme: eviction
    theme_keywords: ["eviction", "landlord", "tenant", "notice", "court", "housing", "rent", "lease"]
    nav_urls: ["/legal-help/housing", "/apply-for-help"]
    turns:
      - question: "i just got a 3 day notice on my door what do i do"
        description: "Eviction — initial panic"
        assert:
          - type: contains-any
            value: ["notice", "eviction", "3-day", "three day", "landlord", "housing", "legal help", "Legal Advice Line"]
          - type: javascript
            value: "const l = output.toLowerCase(); l.includes('not legal advice') || l.includes('informational') || l.includes('disclaimer') || l.includes('cannot provide legal advice') || l.includes(\"can't give legal advice\") || l.includes('general information') || l.includes('not a substitute') || l.includes('legal advice line') || l.includes('advice line') || l.includes('apply for help') || l.includes('speak with') || l.includes('consult') || l.includes('attorney') || l.includes('lawyer') || l.includes('call 911') || l.includes('in danger') || l.includes('immediate danger') || l.includes('safety') || l.includes('emergency') || l.includes('legal help') || l.includes(\"here's our\") || output.includes('/legal-help/') || output.includes('/apply-for-help') || l.includes('cannot assist') || l.includes('does not handle') || l.includes(\"don't handle\")"
            metric: includes-caveat

      - question: "its for not paying rent but i paid last month... i have the receipt"
        description: "Eviction — disputes basis with evidence"
        assert:
          - type: contains-any
            value: ["proof", "receipt", "payment", "evidence", "dispute", "paid", "record", "housing", "legal help", "apply", "Legal Advice Line"]

      - question: "ok but what if they dont care about my receipt and file anyway"
        description: "Eviction — worried about court filing"
        assert:
          - type: contains-any
            value: ["court", "file", "summons", "complaint", "answer", "respond", "hearing", "legal help", "resources", "Legal Advice Line", "/legal-help/housing", "/apply-for-help"]

      - question: "how long do i actually have before they can kick me out"
        description: "Eviction — timeline question"
        assert:
          - type: contains-any
            value: ["days", "time", "deadline", "hearing", "court", "process", "legal help", "resources", "Legal Advice Line", "/legal-help/housing", "/apply-for-help"]

      - question: "wait can my landlord just change the locks while this is going on"
