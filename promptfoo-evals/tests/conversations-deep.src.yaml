          - type: contains-any
            value: ["lock", "illegal", "self-help", "unlawful", "law enforcement", "sheriff", "cannot", "housing", "legal help", "apply", "Legal Advice Line"]

      - question: "this is so stressful... can idaho legal aid actually help me with this"
