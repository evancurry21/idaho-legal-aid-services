  # ─────────────────────────────────────────────────────────────────────
  # E5. Edge — multiple intents at once
  # ─────────────────────────────────────────────────────────────────────
  - id: edge-multi-intent
    theme: multi-intent
    theme_keywords: ["eviction", "divorce", "housing", "family", "help", "legal aid", "apply", "form", "office"]
    nav_urls: ["/legal-help/housing", "/legal-help/family", "/apply-for-help"]
    turns:
      - question: "i need help with an eviction AND a divorce at the same time"
        description: "Multi-intent — two issues"
        assert:
          - type: contains-any
            value: ["eviction", "divorce", "housing", "family", "both", "help"]
          - type: javascript
            value: "const l = output.toLowerCase(); l.includes('not legal advice') || l.includes('informational') || l.includes('disclaimer') || l.includes('cannot provide legal advice') || l.includes(\"can't give legal advice\") || l.includes('general information') || l.includes('not a substitute') || l.includes('legal advice line') || l.includes('advice line') || l.includes('apply for help') || l.includes('speak with') || l.includes('consult') || l.includes('attorney') || l.includes('lawyer') || l.includes('call 911') || l.includes('in danger') || l.includes('immediate danger') || l.includes('safety') || l.includes('emergency') || l.includes('legal help') || l.includes(\"here's our\") || output.includes('/legal-help/') || output.includes('/apply-for-help') || l.includes('cannot assist') || l.includes('does not handle') || l.includes(\"don't handle\")"
            metric: includes-caveat

      - question: "ok lets start with the eviction... i got a notice yesterday"
        description: "Multi-intent — focuses on eviction"
        assert:
          - type: contains-any
            value: ["eviction", "notice", "landlord", "tenant", "right", "respond"]

      - question: "ok now what about the divorce... my husband left and i need to file"
        description: "Multi-intent — pivots to divorce"
        assert:
          - type: contains-any
            value: ["divorce", "file", "petition", "court", "process", "family"]

      - question: "do i need separate forms for each thing"
        description: "Multi-intent — forms for both"
        assert:
          - type: contains-any
            value: ["form", "separate", "court", "different", "each", "petition"]

      - question: "is there one office that handles both or do i go to different places"
        description: "Multi-intent — single vs multiple offices"
        assert:
          - type: contains-any
            value: ["office", "legal aid", "both", "same", "help", "handle"]

      - question: "can i apply for help with everything at once or do i have to do it separately"
        description: "Multi-intent — application question"
        assert:
          - type: contains-any
            value: ["apply", "one", "both", "help", "intake", "case", "all"]

      - question: "honestly whats more urgent the eviction or the divorce"
        description: "Multi-intent — prioritization"
        assert:
          - type: contains-any
            value: ["eviction", "urgent", "priority", "timeline", "deadline", "important", "first"]

      - question: "ok im going to call legal aid about all of it... whats the number"
        description: "Multi-intent — contact request"
        assert:
          - type: contains-any
            value: ["call", "phone", "number", "contact", "legal aid", "hotline"]
          - type: javascript
            value: "output.includes('http') || /\\d{3}[-.\\s]?\\d{3}[-.\\s]?\\d{4}/.test(output)"
            metric: includes-contact-info
