#
# Generator: scripts/generate-deep-convos.js
# Output:    tests/conversations-deep.yaml
#
# Categories:
#   A. Service Area Deep-Dives (18 conversations)
#   B. Safety & Crisis Scenarios (8 conversations)
#   C. Navigation & Service Intents (7 conversations)
#   D. Out-of-Scope & Boundary Testing (5 conversations)
#   E. Edge Cases & Adversarial (5 conversations)

conversations:

  # ═══════════════════════════════════════════════════════════════════════
  # CATEGORY A: SERVICE AREA DEEP-DIVES
