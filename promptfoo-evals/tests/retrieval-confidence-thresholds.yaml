# ILAS Site Assistant — Retrieval confidence/refusal threshold contract tests
#
# Metrics:
# - rag-contract-meta-present
# - rag-citation-coverage
# - rag-low-confidence-refusal
#
# `rag-citation-coverage` now means explicit supported citation metadata.
# Links, result URLs, citation-looking text, and broad keywords do not satisfy it.

- vars:
    question: "im raising my granddaughter because my daughter is on drugs... what are my legal options"
  assert:
    - &rag_contract
      type: javascript
      value: file://lib/ilas-assertions.js:hasReadableContractMeta
      metric: rag-contract-meta-present
    - &rag_supported_citation
      type: javascript
      value: file://lib/ilas-assertions.js:hasSupportedCitation
      metric: rag-citation-coverage
    - &rag_no_unsupported_claim
      type: javascript
      value: file://lib/ilas-assertions.js:hasNoUnsupportedClaim
      metric: rag-no-unsupported-claim

- vars:
    question: "whats the difference between guardianship and adoption"
  assert:
    - *rag_contract
    - *rag_supported_citation
    - *rag_no_unsupported_claim

- vars:
