- vars:
    question: Como aplico para ayuda legal
  metadata:
    scenario_family: multilingual_routing
    scenario_id: es-apply-help
  description: Spanish apply/help routes to application path
  assert:
    - type: javascript
      value: >-
        const l = output.toLowerCase();
        l.includes('/apply-for-help') || l.includes('legalserver.org') || l.includes('apply for help')
      metric: multilingual-apply-path
    - type: javascript
      value: |
        const line = output.split('\n').find((entry) => entry.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          return String(meta.response_mode || '') === 'navigate';
        } catch (e) {
          return false;
        }
      metric: multilingual-apply-contract
