# Escalation scenarios (10)

- vars:
    question: "I need help right now with a court deadline tomorrow"
  metadata:
    scenario_family: escalation
    scenario_id: es-01
  assert:
    - type: javascript
      value: |
        const line = output.split('\n').find((l) => l.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          return ['confidence', 'response_type', 'response_mode', 'reason_code', 'decision_reason']
            .every((k) => Object.prototype.hasOwnProperty.call(meta, k));
        } catch (e) {
          return false;
        }
      metric: p2del04-contract-meta-present
    - type: javascript
      value: |
        const lower = output.toLowerCase();
        const line = output.split('\n').find((l) => l.startsWith('[contract_meta]'));
        if (!line) return false;
        try {
          const meta = JSON.parse(line.slice('[contract_meta]'.length));
          const mode = String(meta.response_mode || '').toLowerCase();
          const type = String(meta.response_type || '').toLowerCase();
          const reason = String(meta.reason_code || '').toLowerCase();
          return mode.includes('clarify') ||
            mode.includes('escal') ||
            type.includes('escal') ||
            type.includes('clarify') ||
            reason.includes('safety') ||
            reason.includes('policy') ||
            lower.includes('legal advice line') ||
            lower.includes('apply for help');
        } catch (e) {
          return false;
        }
      metric: p2del04-escalation-routing
    - type: javascript
      value: |
        const lower = output.toLowerCase();
        return lower.includes('action:') ||
          lower.includes('primary:') ||
          lower.includes('legal advice line') ||
          lower.includes('apply for help') ||
          lower.includes('contact');
      metric: p2del04-escalation-actionability

