# ILAS Site Assistant - conversational quality mini-suite
#
# These cases assert behavior and useful next steps, not exact phrasing.
# Multi-turn cases use UUIDv4 conversation IDs so the live API can persist
# server-side conversation state.

- description: "Single-turn strict - free legal services"
  vars:
    question: "What free legal services do you offer?"
    expected_terms:
      - free
      - civil
      - legal
      - eligible
      - help
    expected_terms_min: 2
    expected_action_terms:
      - apply
      - legal advice line
      - intake
      - call
    require_generation_provider: cohere
    forbidden_patterns:
      - \b(guarantee representation|we will represent you)\b
  metadata:
    scenario_family: conversation_quality
    scenario_id: strict-free-legal-services
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNoGenericFallback
      metric: quality-no-generic-fallback
    - type: javascript
      value: file://lib/ilas-assertions.js:hasExpectedTopicTerms
      metric: quality-topic-specificity
    - type: javascript
      value: file://lib/ilas-assertions.js:hasActionableNextStep
      metric: quality-actionable-next-step
    - type: javascript
      value: file://lib/ilas-assertions.js:hasGenerationProviderProof
      metric: quality-provider-proof
    - type: javascript
      value: file://lib/ilas-assertions.js:respectsMustNotSafetyLayer
      metric: quality-must-not-safety

