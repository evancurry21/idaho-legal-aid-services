- description: "Single-turn core - nonsense"
  vars:
    question: "zxqvplm help thing"
  metadata:
    scenario_family: conversation_quality
    scenario_id: nonsense
  assert:
    - type: javascript
      value: |
        const l = output.toLowerCase();
        const line = output.split('\n').find((entry) => entry.startsWith('[contract_meta]'));
        const meta = line ? JSON.parse(line.slice('[contract_meta]'.length)) : {};
        return (meta.fallback_used === true || String(meta.response_mode || '').toLowerCase() === 'clarify' || /(describe|what kind|more detail|legal issue|apply|forms|faq)/.test(l)) &&
          !/(definitely|guarantee|you should file|you should argue)/.test(l);
      metric: quality-weak-input-handling

