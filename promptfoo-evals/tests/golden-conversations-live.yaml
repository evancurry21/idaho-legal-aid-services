    conversationName: golden-office-context
    scenario_family: golden_conversation
    scenario_id: golden-office-turn-2
    turn: 2
    totalTurns: 2
  assert:
    - type: javascript
      value: |
        const l = output.toLowerCase();
        return /(boise|office)/.test(l) &&
