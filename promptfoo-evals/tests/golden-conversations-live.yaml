# ILAS Site Assistant - API-level golden conversation checks.
#
# These are multi-turn live/API scenarios. They intentionally assert topic
# continuity and useful next steps without depending on exact response copy.

- description: "Golden conversation - eviction context, turn 1"
  vars:
    question: "I got an eviction notice."
  metadata:
    conversationId: "77777777-7777-4777-8777-777777777777"
    conversationName: golden-eviction-context
    scenario_family: golden_conversation
    scenario_id: golden-eviction-turn-1
    turn: 1
    totalTurns: 2
  assert:
    - type: javascript
      value: |
        const l = output.toLowerCase();
        return /(evict|notice|landlord|tenant|housing|legal advice line|apply|call)/.test(l);
      metric: golden-conversation-setup

- description: "Golden conversation - eviction context, turn 2"
  vars:
    question: "What about that?"
  metadata:
    conversationId: "77777777-7777-4777-8777-777777777777"
    conversationName: golden-eviction-context
    scenario_family: golden_conversation
    scenario_id: golden-eviction-turn-2
    turn: 2
    totalTurns: 2
  assert:
    - type: javascript
      value: |
        const l = output.toLowerCase();
        return /(evict|notice|landlord|tenant|housing)/.test(l) &&
          /(legal advice line|apply|call|forms|guides|resource|\/legal-help\/housing)/.test(l) &&
          !/(what would you like to know|how can i help you today|what are you looking for)/.test(l);
      metric: golden-conversation-continuity

