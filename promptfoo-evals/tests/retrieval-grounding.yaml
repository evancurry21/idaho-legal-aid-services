# ILAS Site Assistant - retrieval and grounding quality
#
# Positive grounding cases require supported citation metadata. A generic link,
# result URL, broad keyword, or citation-looking string is not enough.

- description: "Retrieval grounding - eviction FAQ/source"
  vars:
    question: "What does ILAS say about eviction notices?"
    expected_topic: eviction
    expected_terms:
      - eviction
      - notice
      - housing
    expected_terms_min: 2
    expected_action_terms:
      - legal advice line
      - apply
      - resource
    require_retrieval_attempted: true
    require_grounding: true
    require_supported_citation: true
  metadata:
    scenario_family: retrieval_grounding
    scenario_id: eviction-source
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNoGenericFallback
      metric: quality-no-generic-fallback
    - type: javascript
      value: file://lib/ilas-assertions.js:hasExpectedTopicTerms
      metric: quality-topic-specificity
    - type: javascript
      value: file://lib/ilas-assertions.js:hasActionableNextStep
      metric: quality-actionable-next-step
    - type: javascript
      value: file://lib/ilas-assertions.js:hasRetrievalAttemptProof
      metric: quality-retrieval-attempted
    - type: javascript
      value: file://lib/ilas-assertions.js:hasGroundedSupportWhenExpected
      metric: quality-grounding-proof
    - &quality_supported_citation
      type: javascript
      value: file://lib/ilas-assertions.js:hasSupportedCitation
      metric: quality-supported-citation-topic-support
    - &quality_no_unsupported_claim
      type: javascript
      value: file://lib/ilas-assertions.js:hasNoUnsupportedClaim
      metric: quality-no-unsupported-claim
    - &quality_no_disallowed_source
      type: javascript
      value: file://lib/ilas-assertions.js:didNotUseDisallowedSource
      metric: quality-disallowed-source-blocked

