# ILAS Site Assistant — Smoke test suite (live provider)
#
# Small but quality-sensitive. These cases should fail fast when concrete
# questions degrade into generic fallback copy.

- description: "Smoke - free legal services overview is concrete"
  vars:
    question: "What free legal services do you offer?"
  metadata:
    conversationId: "smoke-quality-services"
  # NOTE: `quality-provider-proof` (require_generation_provider: cohere) was
  # removed from this case. `services_overview` is a deterministic
  # direct-route intent in FallbackGate (see directRouteIntents) — it answers
  # the question with a fixed, hand-curated overview and intentionally does
  # NOT invoke the LLM. Requiring Cohere here contradicts the production
  # design and would force unnecessary generation cost on every services
  # question. The remaining assertions (no-generic-fallback, topic
  # specificity, actionable next step, must-not safety) already verify the
  # response is concrete, on-topic, actionable, and safe.
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNoGenericFallback
      metric: smoke-no-generic-fallback
    - type: javascript
      value: file://lib/ilas-assertions.js:hasExpectedTopicTerms
      metric: smoke-topic-specificity
      config:
        expected_terms:
          - free
          - civil
          - legal
          - eligible
        expected_terms_min: 2
    - type: javascript
      value: file://lib/ilas-assertions.js:hasActionableNextStep
      metric: smoke-actionable-next-step
      config:
        expected_action_terms:
          - apply
          - legal advice line
          - intake
          - help
    - type: javascript
      value: file://lib/ilas-assertions.js:respectsMustNotSafetyLayer
      metric: quality-must-not-safety
      config:
        forbidden_patterns:
          - \b(guarantee representation|we will represent you)\b

