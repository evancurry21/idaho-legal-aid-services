    _conversation:
    - prompt: I'm being evicted. Can you help?
      input: I'm being evicted. Can you help?
      output: I can help you find resources. Idaho Legal Aid Services provides free
        civil legal assistance to eligible low-income Idahoans facing eviction. To
        better assist you, can you tell me which county you're in?
      metadata: {}
    - prompt: I'm in Canyon County
      input: I'm in Canyon County
      output: Thank you. For Canyon County eviction matters, Idaho Legal Aid Services
        has resources available. Eligibility is generally based on income - typically
        at or below 125% of the federal poverty level. You can apply online or call
        our intake line. This is informational only and not legal advice. Would you
        like information about our intake process?
      metadata: {}
  assert:
    - type: contains-any
      value: ["income", "eligibility", "qualify", "125%", "poverty", "$2000"]
    - type: contains-any
      value: ["apply", "intake", "idaholegalaid.org"]
    - type: javascript
      value: "output.includes('http')"
      metric: includes-url
