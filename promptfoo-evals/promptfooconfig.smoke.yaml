description: "ILAS Site Assistant — Connectivity smoke evals"

prompts:
  - file://prompts/ilas-thread.yaml

providers:
  - file://providers/ilas-live.js

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasProviderMetadata
      metric: provider-metadata-present
    - type: javascript
      value: file://lib/ilas-assertions.js:isLiveProviderMode
      metric: provider-live-mode
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNonEmptyAssistantResponse
      metric: non-empty-response
    - type: javascript
      value: |
        const visible = String(output || '').split('\n\n[contract_meta]')[0].toLowerCase();
        return !visible.includes('error') && !visible.includes('failed');
      metric: no-error-keywords
    - type: javascript
      value: file://lib/ilas-assertions.js:hasReadableContractMeta
      metric: quality-contract-meta-readable
    # Hard gate: the controller's graceful-degradation catch-all returns
    # HTTP 200 with type=escalation, escalation_type=internal_error_fallback,
    # degraded=true. Smoke fixtures hit a healthy DDEV target — this shape
    # MUST never appear here. If it does, we have a real production-pipeline
    # regression that the 200 status code would otherwise hide.
    - type: javascript
      value: file://lib/ilas-assertions.js:isNotInternalErrorFallback
      metric: smoke-no-internal-error-fallback

tests:
  - file://tests/simulated-user-smoke.yaml
