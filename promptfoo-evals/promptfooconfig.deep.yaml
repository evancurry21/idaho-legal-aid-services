description: "ILAS Site Assistant — Deep thematic conversation evals"

prompts:
  - file://prompts/ilas-thread.yaml

providers:
  - file://providers/ilas-live.js

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasProviderMetadata
      metric: provider-metadata-present
    - type: javascript
      value: file://lib/ilas-assertions.js:isLiveProviderMode
      metric: provider-live-mode
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNonEmptyAssistantResponse
      metric: non-empty-response
    - type: javascript
      value: |
        const visible = String(output || '').split('\n\n[contract_meta]')[0].toLowerCase();
        return !visible.includes('error') && !visible.includes('failed');
      metric: no-error-keywords

# No global includes-caveat — caveat is asserted only on turn 1 of each
# conversation (authored per-turn in the source file). Later turns in a
# thematic conversation shouldn't need to repeat the disclaimer.

tests:
  - file://tests/golden-conversations-live.yaml
  - file://tests/conversations-deep.yaml
  - file://tests/multilingual-routing-live.yaml
