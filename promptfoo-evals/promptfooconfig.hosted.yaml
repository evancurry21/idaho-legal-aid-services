description: "ILAS Site Assistant — Hosted GitHub evals"

prompts:
  - file://prompts/ilas-thread.yaml

providers:
  - file://providers/ilas-live.js

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  assert:
    - type: javascript
      value: "output.length > 50"
      metric: non-empty-response
    - type: javascript
      value: "!output.toLowerCase().includes('error') && !output.toLowerCase().includes('failed')"
      metric: no-error-keywords

tests:
  - file://tests/abuse-safety-hosted.yaml
  - file://tests/retrieval-confidence-thresholds.yaml
  - file://tests/grounding-escalation-safety-boundaries-hosted.yaml
  - file://tests/multilingual-routing-live.yaml
