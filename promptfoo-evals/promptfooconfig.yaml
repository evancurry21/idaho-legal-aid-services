description: "ILAS Site Assistant — LIVE multi-turn evals"

prompts:
  - file://prompts/ilas-thread.yaml

providers:
  - file://providers/ilas-live.js

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  assert:
    - type: javascript
      value: file://lib/ilas-assertions.js:hasProviderMetadata
      metric: provider-metadata-present
    - type: javascript
      value: file://lib/ilas-assertions.js:isLiveProviderMode
      metric: provider-live-mode
    - type: javascript
      value: file://lib/ilas-assertions.js:hasNonEmptyAssistantResponse
      metric: non-empty-response
    - type: javascript
      value: |
        const visible = String(output || '').split('\n\n[contract_meta]')[0].toLowerCase();
        return !visible.includes('error') && !visible.includes('failed');
      metric: no-error-keywords
    - type: javascript
      value: "const l = output.toLowerCase(); l.includes('not legal advice') || l.includes('informational') || l.includes('disclaimer') || l.includes('cannot provide legal advice') || l.includes(\"can't give legal advice\") || l.includes('general information') || l.includes('not a substitute')"
      metric: includes-caveat

tests:
  - file://tests/live-10convos.yaml
