name: 'B5 subtheme'
type: theme
description: 'B5 subtheme subtheme based on Bootstrap 5 theme.'
core_version_requirement: '^10.1 || ^11.0'
'base theme': bootstrap5
libraries:
  - b5subtheme/global-styling
  # bootstrap-icons removed - not used in templates (saves ~87KB)
  # fontawesome removed from global - already compiled into style.css via SCSS (saves ~72KB duplicate)
  - b5subtheme/custom-scripts
  # smart-faq removed from global - attached via template where needed (paragraph--faq-smart-section.html.twig)
  - b5subtheme/search-overlay
  - b5subtheme/scroll-behaviors
  - b5subtheme/lazy-loading
  - b5subtheme/language-switcher
  
ckeditor_stylesheets:
  - css/style.css
ckeditor5-stylesheets:
  - css/ck5style.css
  
regions:
  utility_bar_search: 'Utility Bar Search'
  header: Header
  nav_branding: 'Navigation branding region'
  nav_main: 'Main navigation region'
  nav_additional: 'Additional navigation region (eg search form, social icons, etc)'
  breadcrumb: Breadcrumbs
  content: 'Main content'
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  footer: Footer

libraries-override:
  bootstrap5/global-styling: false
