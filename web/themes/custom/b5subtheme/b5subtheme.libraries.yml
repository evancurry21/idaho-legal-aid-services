global-styling:
  css:
    theme:
      css/style.css: {}

# bootstrap-icons library removed - not used in any templates
# Savings: ~87KB CSS

# fontawesome library removed - CSS now compiled into style.css via SCSS
# Font Awesome icons available globally (solid + brands styles)
# Savings: ~72KB duplicate CSS

