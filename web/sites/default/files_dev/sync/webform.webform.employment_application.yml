id: employment_application
title: 'Employment Application'
description: ''
categories: {  }
elements: |-
  intro:
    '#type': webform_markup
    '#markup': '<div class="application-intro"><h2>Employment Application</h2><p>Thank you for your interest in joining our team. Please complete all sections of this application form. All information will be kept confidential.</p></div>'
  personal_information:
    '#type': fieldset
    '#title': 'Personal Information'
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section">'
    '#suffix': '</div>'
    full_name:
      '#type': textfield
      '#title': 'Full Name'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    email:
      '#type': email
      '#title': 'Email Address'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    phone:
      '#type': tel
      '#title': 'Phone Number'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    address:
      '#type': webform_address
      '#title': Address
      '#required': true
  position_information:
    '#type': fieldset
    '#title': 'Position Information'
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section">'
    '#suffix': '</div>'
    position_applied:
      '#type': select
      '#title': 'Position Applied For'
      '#options_display': buttons
      '#required': true
      '#options':
        software_developer: 'Software Developer'
        project_manager: 'Project Manager'
        ux_designer: 'UX Designer'
        content_specialist: 'Content Specialist'
        other: Other
      '#attributes':
        class:
          - form-select
          - custom-select
    position_other:
      '#type': textfield
      '#title': 'If Other, please specify'
      '#states':
        visible:
          ':input[name="position_applied"]':
            value: other
    available_start_date:
      '#type': date
      '#title': 'Earliest Available Start Date'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-date
    salary_requirements:
      '#type': textfield
      '#title': 'Salary Requirements'
      '#attributes':
        class:
          - form-control
          - custom-input
  work_experience:
    '#type': webform_multiple
    '#title': 'Work Experience'
    '#button_add_label': 'Add Another Work Experience'
    '#add': 3
    '#cardinality': 5
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section">'
    '#suffix': '</div>'
    '#element':
      '#type': container
      employer:
        '#type': textfield
        '#title': Employer
        '#required': true
        '#attributes':
          class:
            - form-control
            - custom-input
      job_title:
        '#type': textfield
        '#title': 'Job Title'
        '#required': true
        '#attributes':
          class:
            - form-control
            - custom-input
      start_date:
        '#type': date
        '#title': 'Start Date'
        '#required': true
        '#attributes':
          class:
            - form-control
            - custom-date
      end_date:
        '#type': date
        '#title': 'End Date'
        '#attributes':
          class:
            - form-control
            - custom-date
      current_position:
        '#type': checkbox
        '#title': 'I currently work here'
        '#attributes':
          class:
            - form-check-input
            - custom-checkbox
      responsibilities:
        '#type': textarea
        '#title': 'Key Responsibilities'
        '#attributes':
          class:
            - form-control
            - custom-textarea
  education:
    '#type': webform_multiple
    '#title': Education
    '#button_add_label': 'Add Another Education Entry'
    '#add': 2
    '#cardinality': 5
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section">'
    '#suffix': '</div>'
    '#element':
      '#type': container
      institution:
        '#type': textfield
        '#title': Institution
        '#attributes':
          class:
            - form-control
            - custom-input
      degree:
        '#type': textfield
        '#title': Degree/Certificate
        '#attributes':
          class:
            - form-control
            - custom-input
      graduation_date:
        '#type': date
        '#title': 'Graduation Date'
        '#attributes':
          class:
            - form-control
            - custom-date
  file_uploads:
    '#type': fieldset
    '#title': 'Document Uploads'
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section file-upload-section">'
    '#suffix': '</div>'
    resume:
      '#type': managed_file
      '#title': Resume
      '#required': true
      '#multiple': false
      '#file_extensions': 'pdf doc docx'
      '#max_filesize': 5MB
      '#description': 'Upload your resume (PDF, DOC, or DOCX format, max 5MB)'
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
    cover_letter:
      '#type': managed_file
      '#title': 'Cover Letter'
      '#multiple': false
      '#file_extensions': 'pdf doc docx'
      '#max_filesize': 5MB
      '#description': 'Upload your cover letter (PDF, DOC, or DOCX format, max 5MB)'
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
    additional_documents:
      '#type': managed_file
      '#title': 'Additional Documents'
      '#multiple': true
      '#file_extensions': 'pdf doc docx jpg jpeg png'
      '#max_filesize': 10MB
      '#description': 'Upload any additional documents (certifications, portfolios, etc.)'
      '#max_items': 3
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
  additional_information:
    '#type': fieldset
    '#title': 'Additional Information'
    '#attributes':
      class:
        - card
        - mb-4
    '#prefix': '<div class="application-section">'
    '#suffix': '</div>'
    referral_source:
      '#type': select
      '#title': 'How did you hear about us?'
      '#options':
        company_website: 'Company Website'
        job_board: 'Job Board'
        social_media: 'Social Media'
        employee_referral: 'Employee Referral'
        other: Other
      '#attributes':
        class:
          - form-select
          - custom-select
    referral_details:
      '#type': textfield
      '#title': 'Please provide details'
      '#states':
        visible:
          ':input[name="referral_source"]':
            '!value': company_website
      '#attributes':
        class:
          - form-control
          - custom-input
    additional_comments:
      '#type': textarea
      '#title': 'Additional Comments'
      '#attributes':
        class:
          - form-control
          - custom-textarea
  agreement:
    '#type': checkbox
    '#title': 'I certify that the information provided in this application is true and complete to the best of my knowledge.'
    '#required': true
    '#required_error': 'You must agree to this statement to submit your application.'
    '#attributes':
      class:
        - form-check-input
        - consent-checkbox
    '#wrapper_attributes':
      class:
        - application-agreement
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Submit Application'
    '#submit__attributes':
      class:
        - btn
        - btn-primary
        - btn-lg
        - custom-submit
