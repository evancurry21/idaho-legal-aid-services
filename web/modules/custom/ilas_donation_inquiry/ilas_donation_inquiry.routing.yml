ilas_donation_inquiry.submit:
  path: '/donation-inquiry/submit'
  defaults:
    _controller: '\Drupal\ilas_donation_inquiry\Controller\DonationInquiryController::submit'
    _title: 'Donation Inquiry Submission'
  requirements:
    _access: 'TRUE'
  methods: [POST]

ilas_donation_inquiry.token:
  path: '/donation-inquiry/token'
  defaults:
    _controller: '\Drupal\ilas_donation_inquiry\Controller\DonationInquiryController::getToken'
    _title: 'Donation Inquiry CSRF Token'
  requirements:
    _access: 'TRUE'
  methods: [GET]
