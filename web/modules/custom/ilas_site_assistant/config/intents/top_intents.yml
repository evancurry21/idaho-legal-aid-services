# Top Intents Pack — versioned config for Aila chatbot intents.
#
# Each intent entry defines:
#   canonical_key: unique identifier (matches IntentRouter taxonomy)
#   label: human-readable short label
#   answer_text: default response text
#   primary_action: {label, url} main CTA
#   chips: suggested follow-up actions as {label, intent} pairs
#   synonyms: supplementary keyword matches for reverse lookup
#   clarifier: optional {question, options[]} for disambiguation
#
# Chips are quick-reply style: clicking sends a message back to the bot.
# The frontend resolves `intent` to a message string.

version: '1.0'

