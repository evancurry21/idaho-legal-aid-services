ilas_site_assistant.settings:
  type: config_object
  label: 'ILAS Site Assistant settings'
  mapping:
    disclaimer_text:
      type: string
      label: 'Disclaimer text'
    enable_global_widget:
      type: boolean
      label: 'Enable global widget'
    enable_faq:
      type: boolean
      label: 'Enable FAQ answers'
    enable_resources:
      type: boolean
      label: 'Enable resource/form/guide search'
    enable_logging:
      type: boolean
      label: 'Enable analytics logging'
    log_retention_days:
      type: integer
      label: 'Log retention days'
    excluded_paths:
      type: sequence
      label: 'Excluded paths'
      sequence:
        type: string
        label: 'Path'
    canonical_urls:
      type: mapping
      label: 'Canonical URLs'
      mapping:
        apply:
          type: string
          label: 'Apply for Help URL'
        hotline:
          type: string
          label: 'Hotline URL'
        offices:
          type: string
          label: 'Offices URL'
        donate:
          type: string
          label: 'Donate URL'
        feedback:
          type: string
          label: 'Feedback URL'
        resources:
          type: string
          label: 'Resources URL'
        forms:
          type: string
          label: 'Forms URL'
        guides:
          type: string
          label: 'Guides URL'
        senior_risk_detector:
          type: string
          label: 'Senior Risk Detector URL'
        faq:
          type: string
          label: 'FAQ URL'
        services:
          type: string
          label: 'Services URL'
        service_areas:
          type: mapping
          label: 'Service area URLs'
          mapping:
            housing:
              type: string
              label: 'Housing URL'
            family:
              type: string
              label: 'Family URL'
            seniors:
              type: string
              label: 'Seniors URL'
            health:
              type: string
              label: 'Health URL'
            consumer:
              type: string
              label: 'Consumer URL'
            civil_rights:
              type: string
              label: 'Civil Rights URL'
    faq_node_path:
      type: string
      label: 'FAQ node path'
    welcome_message:
      type: string
      label: 'Welcome message'
    escalation_message:
      type: string
      label: 'Escalation message'
    policy_keywords:
      type: mapping
      label: 'Policy keywords'
      mapping:
        legal_advice:
          type: sequence
          label: 'Legal advice keywords'
          sequence:
            type: string
            label: 'Keyword'
        pii_indicators:
          type: sequence
          label: 'PII indicator keywords'
          sequence:
            type: string
            label: 'Keyword'
    rate_limit_per_minute:
      type: integer
      label: 'Rate limit per minute per IP'
    rate_limit_per_hour:
      type: integer
      label: 'Rate limit per hour per IP'
    session_bootstrap:
      type: mapping
      label: 'Anonymous session bootstrap guardrail settings'
      mapping:
        rate_limit_per_minute:
          type: integer
          label: 'Bootstrap new-session rate limit per minute per IP'
        rate_limit_per_hour:
          type: integer
          label: 'Bootstrap new-session rate limit per hour per IP'
        observation_window_hours:
          type: integer
          label: 'Bootstrap observability window in hours'
    read_endpoint_rate_limits:
      type: mapping
      label: 'Read endpoint abuse-control settings'
      mapping:
        suggest:
          type: mapping
          label: 'Suggest endpoint rate limits'
          mapping:
            rate_limit_per_minute:
              type: integer
              label: 'Suggest rate limit per minute per IP'
            rate_limit_per_hour:
              type: integer
              label: 'Suggest rate limit per hour per IP'
        faq:
          type: mapping
          label: 'FAQ endpoint rate limits'
          mapping:
            rate_limit_per_minute:
              type: integer
              label: 'FAQ rate limit per minute per IP'
            rate_limit_per_hour:
              type: integer
              label: 'FAQ rate limit per hour per IP'
    conversation_logging:
      type: mapping
      label: 'Conversation logging settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable conversation logging'
        retention_hours:
          type: integer
          label: 'Retention period in hours'
        redact_pii:
          type: boolean
          label: 'Redact PII before storing'
        show_user_notice:
          type: boolean
          label: 'Show user notice about conversation review'
    llm:
      type: mapping
      label: 'LLM Enhancement Settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable LLM enhancement'
        provider:
          type: string
          label: 'LLM provider (gemini_api or vertex_ai)'
        model:
          type: string
          label: 'Model name'
        api_key:
          type: string
          label: 'Gemini API key'
        project_id:
          type: string
          label: 'Google Cloud project ID'
        location:
          type: string
          label: 'Vertex AI location'
        max_tokens:
          type: integer
          label: 'Maximum output tokens'
        temperature:
          type: float
          label: 'Temperature (0.0-1.0)'
        enhance_faq:
          type: boolean
          label: 'Enhance FAQ responses'
        enhance_resources:
          type: boolean
          label: 'Enhance resource responses'
        enhance_greetings:
          type: boolean
          label: 'Enhance greeting responses'
        fallback_on_error:
          type: boolean
          label: 'Fallback to rule-based on LLM error'
        safety_threshold:
          type: string
          label: 'Gemini safety filter threshold'
        cache_ttl:
          type: integer
          label: 'Response cache TTL in seconds (0 = disabled)'
        max_retries:
          type: integer
          label: 'Max retry attempts on transient API failures (0 = no retries)'
        circuit_breaker:
          type: mapping
          label: 'Circuit breaker settings'
          mapping:
            failure_threshold:
              type: integer
              label: 'Consecutive failures to open circuit'
            failure_window_seconds:
              type: integer
              label: 'Time window for counting consecutive failures'
            cooldown_seconds:
              type: integer
              label: 'Seconds to keep circuit open before half-open probe'
        global_rate_limit:
          type: mapping
          label: 'Global LLM rate limit settings'
          mapping:
            max_per_hour:
              type: integer
              label: 'Maximum LLM API calls per hour (0 = unlimited)'
            window_seconds:
              type: integer
              label: 'Rate limit window in seconds (default: 3600)'
    fallback_gate:
      type: mapping
      label: 'Fallback Gate Configuration'
      mapping:
        thresholds:
          type: mapping
          label: 'Confidence thresholds'
          mapping:
            intent_high_conf:
              type: float
              label: 'High intent confidence threshold (default: 0.85)'
            intent_medium_conf:
              type: float
              label: 'Medium intent confidence threshold (default: 0.65)'
            intent_low_conf:
              type: float
              label: 'Low intent confidence threshold (default: 0.40)'
            retrieval_high_score:
              type: float
              label: 'High retrieval score threshold (default: 0.75)'
            retrieval_medium_score:
              type: float
              label: 'Medium retrieval score threshold (default: 0.50)'
            retrieval_low_score:
              type: float
              label: 'Low retrieval score threshold (default: 0.30)'
            retrieval_score_gap_high:
              type: float
              label: 'High score gap threshold (default: 0.25)'
            retrieval_score_gap_low:
              type: float
              label: 'Low score gap threshold (default: 0.10)'
            retrieval_min_results:
              type: integer
              label: 'Minimum results for confident retrieval (default: 1)'
            combined_high_conf:
              type: float
              label: 'High combined confidence threshold (default: 0.80)'
            combined_fallback_threshold:
              type: float
              label: 'Fallback threshold for combined confidence (default: 0.50)'
            short_message_words:
              type: integer
              label: 'Short message word count threshold (default: 3)'
            ambiguous_message_words:
              type: integer
              label: 'Ambiguous message word count threshold (default: 2)'
    retrieval:
      type: mapping
      label: 'Retrieval index settings'
      mapping:
        faq_index_id:
          type: string
          label: 'FAQ lexical Search API index ID'
        resource_index_id:
          type: string
          label: 'Resource lexical Search API index ID'
        resource_fallback_index_id:
          type: string
          label: 'Resource lexical fallback Search API index ID'
        faq_vector_index_id:
          type: string
          label: 'FAQ vector Search API index ID'
        resource_vector_index_id:
          type: string
          label: 'Resource vector Search API index ID'
    retrieval_contract:
      type: mapping
      label: 'Drupal-primary retrieval contract settings (PHARD-06)'
      mapping:
        policy_version:
          type: string
          label: 'Retrieval contract policy version identifier'
        enforcement_mode:
          type: string
          label: 'Enforcement mode (advisory or strict)'
        lexical_priority_boost:
          type: integer
          label: 'Tie-break boost for lexical items during duplicate comparison'
        min_lexical_preserved:
          type: integer
          label: 'Minimum lexical results preserved in merge output'
        approved_source_classes:
          type: sequence
          label: 'Exhaustive list of approved source classes'
          sequence:
            type: string
            label: 'Source class'
        primary_source_classes:
          type: sequence
          label: 'Primary (Drupal-authoritative) source classes'
          sequence:
            type: string
            label: 'Source class'
        supplement_source_classes:
          type: sequence
          label: 'Supplement-only (vector enrichment) source classes'
          sequence:
            type: string
            label: 'Source class'
    vector_search:
      type: mapping
      label: 'Vector search enhancement settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable vector search fallback'
        fallback_threshold:
          type: integer
          label: 'Minimum lexical results before vector search fires'
        min_vector_score:
          type: float
          label: 'Minimum cosine similarity score (0-1)'
        score_normalization_factor:
          type: integer
          label: 'Score normalization factor for ranking parity'
        min_lexical_score:
          type: integer
          label: 'Minimum lexical score for quality check (0 = disabled)'
    safety_alerting:
      type: mapping
      label: 'Safety spike alerting settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable safety spike alerting'
        threshold:
          type: integer
          label: 'Number of violations to trigger alert'
        window_hours:
          type: integer
          label: 'Lookback window in hours'
        cooldown_minutes:
          type: integer
          label: 'Minimum gap between alerts in minutes'
        recipients:
          type: string
          label: 'Comma-separated email addresses for alerts'
    history_fallback:
      type: mapping
      label: 'History-aware intent fallback settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable history-aware intent fallback'
        max_turns:
          type: integer
          label: 'Maximum history turns to analyze (default: 6)'
        time_window_sec:
          type: integer
          label: 'Time window in seconds for eligible turns (default: 600)'
        dominance_threshold:
          type: float
          label: 'Minimum dominance ratio to accept fallback (default: 0.5)'
        min_eligible_turns:
          type: integer
          label: 'Minimum eligible turns needed for fallback (default: 1)'
    ab_testing:
      type: mapping
      label: 'A/B testing settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable A/B testing'
        experiments:
          type: sequence
          label: 'Active experiments'
          sequence:
            type: mapping
            label: 'Experiment'
            mapping:
              id:
                type: string
                label: 'Experiment ID'
              variants:
                type: sequence
                label: 'Variant names'
                sequence:
                  type: string
                  label: 'Variant'
              allocation:
                type: sequence
                label: 'Percentage allocation per variant'
                sequence:
                  type: integer
                  label: 'Percentage'
    slo:
      type: mapping
      label: 'SLO target definitions'
      mapping:
        availability_target_pct:
          type: float
          label: 'Availability target percentage (default: 99.5)'
        latency_p95_target_ms:
          type: integer
          label: 'P95 latency target in milliseconds (default: 2000)'
        latency_p99_target_ms:
          type: integer
          label: 'P99 latency target in milliseconds (default: 5000)'
        error_rate_target_pct:
          type: float
          label: 'Error rate target percentage (default: 5.0)'
        error_budget_window_hours:
          type: integer
          label: 'Error budget evaluation window in hours (default: 168)'
        cron_max_age_seconds:
          type: integer
          label: 'Maximum cron staleness in seconds (default: 7200)'
        cron_expected_cadence_seconds:
          type: integer
          label: 'Expected cron cadence in seconds (default: 3600)'
        queue_max_depth:
          type: integer
          label: 'Maximum queue depth before backlog alert (default: 10000)'
        queue_max_age_seconds:
          type: integer
          label: 'Maximum queue item age in seconds (default: 3600)'
    source_governance:
      type: mapping
      label: 'Source freshness and provenance governance settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable source freshness/provenance governance'
        policy_version:
          type: string
          label: 'Governance policy version identifier'
        observation_window_hours:
          type: integer
          label: 'Observation window length in hours'
        stale_ratio_alert_pct:
          type: float
          label: 'Stale-source ratio alert threshold percent'
        min_observations:
          type: integer
          label: 'Minimum observation count before unknown/missing ratio degradation'
        unknown_ratio_degrade_pct:
          type: float
          label: 'Unknown-freshness ratio threshold percent for degraded status'
        missing_source_url_ratio_degrade_pct:
          type: float
          label: 'Missing-source-url ratio threshold percent for degraded status'
        alert_cooldown_minutes:
          type: integer
          label: 'Minimum minutes between stale-ratio alerts'
        source_classes:
          type: mapping
          label: 'Per-source-class governance policy'
          mapping:
            faq_lexical:
              type: mapping
              label: 'FAQ lexical source policy'
              mapping:
                provenance_label:
                  type: string
                  label: 'Provenance label for FAQ lexical source'
                owner_role:
                  type: string
                  label: 'Governance owner role for FAQ lexical source'
                max_age_days:
                  type: integer
                  label: 'Maximum freshness age in days for FAQ lexical source'
                require_source_url:
                  type: boolean
                  label: 'Whether FAQ lexical source must include source URL'
            faq_vector:
              type: mapping
              label: 'FAQ vector source policy'
              mapping:
                provenance_label:
                  type: string
                  label: 'Provenance label for FAQ vector source'
                owner_role:
                  type: string
                  label: 'Governance owner role for FAQ vector source'
                max_age_days:
                  type: integer
                  label: 'Maximum freshness age in days for FAQ vector source'
                require_source_url:
                  type: boolean
                  label: 'Whether FAQ vector source must include source URL'
            resource_lexical:
              type: mapping
              label: 'Resource lexical source policy'
              mapping:
                provenance_label:
                  type: string
                  label: 'Provenance label for resource lexical source'
                owner_role:
                  type: string
                  label: 'Governance owner role for resource lexical source'
                max_age_days:
                  type: integer
                  label: 'Maximum freshness age in days for resource lexical source'
                require_source_url:
                  type: boolean
                  label: 'Whether resource lexical source must include source URL'
            resource_vector:
              type: mapping
              label: 'Resource vector source policy'
              mapping:
                provenance_label:
                  type: string
                  label: 'Provenance label for resource vector source'
                owner_role:
                  type: string
                  label: 'Governance owner role for resource vector source'
                max_age_days:
                  type: integer
                  label: 'Maximum freshness age in days for resource vector source'
                require_source_url:
                  type: boolean
                  label: 'Whether resource vector source must include source URL'
    vector_index_hygiene:
      type: mapping
      label: 'Vector index hygiene and refresh monitoring settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable vector index hygiene policy enforcement'
        policy_version:
          type: string
          label: 'Vector hygiene policy version identifier'
        refresh_mode:
          type: string
          label: 'Refresh mode (incremental only in Phase 2)'
        refresh_interval_hours:
          type: integer
          label: 'Refresh cadence in hours'
        overdue_grace_minutes:
          type: integer
          label: 'Additional grace minutes before overdue state'
        max_items_per_run:
          type: integer
          label: 'Maximum incremental index items processed per run'
        alert_cooldown_minutes:
          type: integer
          label: 'Minimum minutes between degraded hygiene alerts'
        managed_indexes:
          type: mapping
          label: 'Managed vector index metadata standards'
          mapping:
            faq_vector:
              type: mapping
              label: 'FAQ vector index hygiene policy'
              mapping:
                owner_role:
                  type: string
                  label: 'Owner role for FAQ vector index hygiene'
                expected_server_id:
                  type: string
                  label: 'Expected Search API server id'
                expected_metric:
                  type: string
                  label: 'Expected vector similarity metric'
                expected_dimensions:
                  type: integer
                  label: 'Expected embedding dimensions'
            resource_vector:
              type: mapping
              label: 'Resource vector index hygiene policy'
              mapping:
                owner_role:
                  type: string
                  label: 'Owner role for resource vector index hygiene'
                expected_server_id:
                  type: string
                  label: 'Expected Search API server id'
                expected_metric:
                  type: string
                  label: 'Expected vector similarity metric'
                expected_dimensions:
                  type: integer
                  label: 'Expected embedding dimensions'
    audit_governance:
      type: mapping
      label: 'Audit governance configuration'
      mapping:
        audit_domain_classes:
          type: sequence
          label: 'Safety classes in the no-legal-advice audit domain'
          sequence:
            type: string
            label: 'Class name'
        audit_domain_event_types:
          type: sequence
          label: 'Analytics event types included in audit reports'
          sequence:
            type: string
            label: 'Event type'
        report_cadence_days:
          type: integer
          label: 'Report cadence in days'
        report_required_permission:
          type: string
          label: 'Permission required to generate and view audit reports'
        signoff_required_permission:
          type: string
          label: 'Permission required to record monthly signoff'
        report_retention_days:
          type: integer
          label: 'Days to retain generated report artifacts'
        signoff_deadline_days:
          type: integer
          label: 'Days after period end to complete signoff'
    cost_control:
      type: mapping
      label: 'Cost control policy settings'
      mapping:
        daily_call_limit:
          type: integer
          label: 'Maximum LLM API calls per day (0 = unlimited)'
        monthly_call_limit:
          type: integer
          label: 'Maximum LLM API calls per month (0 = unlimited)'
        sample_rate:
          type: float
          label: 'Sampling rate for LLM calls (0.0-1.0)'
        cache_hit_rate_target:
          type: float
          label: 'Target cache hit rate (0.0-1.0)'
        cache_stats_window_seconds:
          type: integer
          label: 'Cache stats observation window in seconds'
        manual_kill_switch:
          type: boolean
          label: 'Manual kill switch for LLM calls'
        pricing:
          type: mapping
          label: 'LLM pricing for cost estimation'
          mapping:
            model:
              type: string
              label: 'Model name for pricing reference'
            input_per_1m_tokens:
              type: float
              label: 'Cost per 1M input tokens (USD)'
            output_per_1m_tokens:
              type: float
              label: 'Cost per 1M output tokens (USD)'
        alert_cooldown_minutes:
          type: integer
          label: 'Minimum minutes between cost alerts'
    langfuse:
      type: mapping
      label: 'Langfuse observability settings'
      mapping:
        enabled:
          type: boolean
          label: 'Enable Langfuse tracing'
        host:
          type: string
          label: 'Langfuse API host'
        public_key:
          type: string
          label: 'Langfuse public key'
        secret_key:
          type: string
          label: 'Langfuse secret key'
        sample_rate:
          type: float
          label: 'Trace sample rate (0.0-1.0)'
        environment:
          type: string
          label: 'Environment label (e.g., production, staging)'
        timeout:
          type: float
          label: 'HTTP timeout for Langfuse API calls (seconds)'
        max_queue_depth:
          type: integer
          label: 'Maximum queue depth before dropping new items'
        max_item_age_seconds:
          type: integer
          label: 'Maximum item age in seconds before discarding'
    review_loop:
      type: mapping
      label: 'Review loop configuration'
      mapping:
        owner_role:
          type: string
          label: 'Owner role'
        cadence:
          type: string
          label: 'Review cadence'
        scope:
          type: sequence
          label: 'Review scope items'
          sequence:
            type: string
            label: 'Scope item'
        escalation_path:
          type: string
          label: 'Escalation path'
        artifact_location:
          type: string
          label: 'Artifact location'
