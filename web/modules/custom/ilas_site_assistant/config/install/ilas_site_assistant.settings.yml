disclaimer_text: 'I can help you find information on our website. But I <strong>cannot</strong> provide legal advice.'
enable_global_widget: true
enable_assistant_page: true
enable_faq: true
enable_resources: true
enable_logging: true
log_retention_days: 730
excluded_paths:
  - /admin
  - /user/login
  - /user/password
canonical_urls:
  apply: '/apply-for-help'
  hotline: '/Legal-Advice-Line'
  offices: '/contact/offices'
  donate: '/donate'
  feedback: '/get-involved/feedback'
  resources: '/what-we-do/resources'
  forms: '/forms'
  guides: '/guides'
  senior_risk_detector: '/resources/legal-risk-detector'
  faq: '/faq'
  services: '/services'
  service_areas:
    housing: '/legal-help/housing'
    family: '/legal-help/family'
    seniors: '/legal-help/seniors'
    health: '/legal-help/health'
    consumer: '/legal-help/consumer'
    civil_rights: '/legal-help/civil-rights'
faq_node_path: '/faq'
welcome_message: 'Hello! I can help you find information on our website. What are you looking for today?'
escalation_message: 'For personalized legal assistance, please contact our Legal Advice Line or apply for help.'

# Request-time assistant LLM settings.
# The assistant path stays deterministic; Cohere is used only for bounded
# ambiguous-intent classification when operators enable the runtime toggle.
llm:
  enabled: false
  max_tokens: 150
  temperature: 0.3
  fallback_on_error: true  # Use rule-based response if LLM fails
  safety_threshold: 'BLOCK_MEDIUM_AND_ABOVE'  # BLOCK_LOW_AND_ABOVE | BLOCK_MEDIUM_AND_ABOVE | BLOCK_ONLY_HIGH
  cache_ttl: 3600  # Response cache TTL in seconds (0 = disabled)
  max_retries: 1   # Max retry attempts on transient failures (0 = no retries)
  circuit_breaker:
    failure_threshold: 3      # Consecutive failures to open circuit
    failure_window_seconds: 60  # Time window for counting consecutive failures
    cooldown_seconds: 300     # Seconds to keep circuit open before half-open probe
  global_rate_limit:
    max_per_hour: 500           # Maximum LLM API calls per hour (0 = unlimited)
    window_seconds: 3600        # Window size in seconds

# Rate limiting (per IP)
rate_limit_per_minute: 15
rate_limit_per_hour: 120
session_bootstrap:
  rate_limit_per_minute: 60
  rate_limit_per_hour: 600
  observation_window_hours: 24
read_endpoint_rate_limits:
  suggest:
    rate_limit_per_minute: 120
    rate_limit_per_hour: 1200
  faq:
    rate_limit_per_minute: 60
    rate_limit_per_hour: 600

# Conversation logging (opt-in, default OFF)
# When enabled, stores PII-redacted message pairs for QA/debugging.
conversation_logging:
  enabled: false
  retention_hours: 72         # Auto-delete after this many hours
  redact_pii: true            # Apply PII redaction before storing
  show_user_notice: true      # Display notice in widget about review

# Fallback Gate Configuration
# Controls when to use built-in answers vs clarification or hard-route behavior.
fallback_gate:
  thresholds:
    # Intent confidence thresholds (0-1)
    intent_high_conf: 0.85       # High confidence = answer directly
    intent_medium_conf: 0.65     # Medium confidence = answer with lower certainty
    intent_low_conf: 0.40        # Below this = consider clarification

    # Retrieval score thresholds (0-1)
    retrieval_high_score: 0.75   # High retrieval = confident answer
    retrieval_medium_score: 0.50 # Medium retrieval = may need enhancement
    retrieval_low_score: 0.30    # Below this = low confidence in results

    # Score gap thresholds (indicates clear winner in results)
    retrieval_score_gap_high: 0.25  # Large gap = clear best result
    retrieval_score_gap_low: 0.10   # Small gap = ambiguous results

    # Minimum results needed
    retrieval_min_results: 1

    # Combined confidence thresholds
    combined_high_conf: 0.80         # High combined = confident answer
    combined_fallback_threshold: 0.50 # Below this = consider clarification

    # Message characteristics
    short_message_words: 3      # Messages this short get lower confidence
    ambiguous_message_words: 2  # Very short = ask for clarification

# Vector Search Enhancement (Option A: fallback enrichment)
# When lexical results are sparse, supplements with Pinecone semantic search.
# Requires dedicated Pinecone Search API servers and vector indexes to be
# configured for FAQ and resources separately.
#
# Score normalization notes:
# - Cosine similarity scores range 0-1 (higher = more similar).
# - Lexical (BM25) scores are on a different, unbounded scale.
# - score_normalization_factor converts cosine to a comparable range.
#   Default 100 means cosine 0.72 becomes score 72.
# - Since vector search only fires when lexical results are sparse,
#   the normalization primarily affects ordering within the merged set.
# - The raw cosine score is preserved as 'vector_score' on each result
#   for operator tuning and debugging.
# - The Pinecone HTTP client uses Guzzle defaults (~30s timeout).
#   Vector search failures are caught and return empty results gracefully.
retrieval:
  faq_index_id: 'faq_accordion'
  resource_index_id: 'assistant_resources'
  resource_fallback_index_id: 'content'
  faq_vector_index_id: 'faq_accordion_vector'
  resource_vector_index_id: 'assistant_resources_vector'

vector_search:
  enabled: false
  fallback_threshold: 2        # Min lexical results before vector fires
  min_vector_score: 0.70       # Min cosine similarity to include (0-1)
  score_normalization_factor: 100  # Multiply cosine score by this for ranking parity
  min_lexical_score: 0         # Min lexical score for quality check (0 = disabled)
                               # If set > 0 and all lexical results score below this,
                               # vector search fires even when count >= fallback_threshold

# Voyage AI reranking (second-stage semantic reranking)
# Reorders retrieval results using Voyage AI before response grounding.
# Requires ILAS_VOYAGE_API_KEY secret and ILAS_VOYAGE_ENABLED toggle.
voyage:
  enabled: false
  rerank_model: 'rerank-2'
  api_timeout: 3.0
  max_candidates: 20
  top_k: 5
  min_results_to_rerank: 2
  circuit_breaker:
    failure_threshold: 3
    cooldown_seconds: 300
  fallback_on_error: true

# Retrieval contract (PHARD-06)
# Formalizes the Drupal-primary retrieval contract: lexical sources have
# structural priority over vector supplements. Advisory enforcement only —
# governance flags inform operators but never suppress results.
retrieval_contract:
  policy_version: 'phard_06_v1'
  enforcement_mode: 'advisory'
  lexical_priority_boost: 5
  min_lexical_preserved: 1
  approved_source_classes:
    - 'faq_lexical'
    - 'faq_vector'
    - 'resource_lexical'
    - 'resource_vector'
  primary_source_classes:
    - 'faq_lexical'
    - 'resource_lexical'
  supplement_source_classes:
    - 'faq_vector'
    - 'resource_vector'

# Safety spike alerting (cron-driven, default OFF)
# Sends email when safety violations exceed threshold within window.
safety_alerting:
  enabled: false
  threshold: 20               # Number of violations to trigger alert
  window_hours: 1             # Lookback window in hours
  cooldown_minutes: 60        # Minimum gap between alerts
  recipients: ''              # Comma-separated email addresses

# History-aware intent fallback (fires ONLY on direct-route unknown)
# When the router returns 'unknown', checks recent conversation history
# for a dominant topic to maintain multi-turn continuity.
history_fallback:
  enabled: true
  max_turns: 6
  time_window_sec: 600
  dominance_threshold: 0.5
  min_eligible_turns: 1

flows:
  enabled: true
  office_followup:
    enabled: true
    handler: 'office_followup'
    trigger_intents:
      - 'apply'
    require_followup_prompt: true
    max_turns: 2
    ttl_seconds: 1800

# A/B testing framework (minimal, default OFF)
# Deterministic variant assignment per conversation_id.
ab_testing:
  enabled: false
  experiments:
    - id: 'welcome_v2'
      variants:
        - 'control'
        - 'expanded_welcome'
      allocation:
        - 50
        - 50

# Langfuse observability (default OFF)
# Credentials should be set via settings.php from environment variables:
#   $config['ilas_site_assistant.settings']['langfuse']['public_key'] = getenv('LANGFUSE_PUBLIC_KEY');
#   $config['ilas_site_assistant.settings']['langfuse']['secret_key'] = getenv('LANGFUSE_SECRET_KEY');
#   $config['ilas_site_assistant.settings']['langfuse']['environment'] = getenv('PANTHEON_ENVIRONMENT') ?: 'local';
langfuse:
  enabled: false
  host: 'https://us.cloud.langfuse.com'
  public_key: ''
  secret_key: ''
  sample_rate: 1.0
  environment: 'production'
  redacted_preview_enabled: false
  redacted_preview_max_chars: 160
  timeout: 5.0
  max_queue_depth: 10000
  max_item_age_seconds: 3600

# Audit governance for "no legal advice" compliance reporting
# See docs/aila/AUDIT_GOVERNANCE_SPEC.md for full specification.
slo:
  availability_target_pct: 99.5
  latency_p95_target_ms: 2000
  latency_p99_target_ms: 5000
  error_rate_target_pct: 5.0
  error_budget_window_hours: 168
  cron_max_age_seconds: 7200
  cron_expected_cadence_seconds: 3600
  queue_max_depth: 10000
  queue_max_age_seconds: 3600

source_governance:
  enabled: true
  policy_version: 'p2_obj_03_v1'
  observation_window_hours: 24
  stale_ratio_alert_pct: 18.0
  min_observations: 20
  unknown_ratio_degrade_pct: 22.0
  missing_source_url_ratio_degrade_pct: 9.0
  alert_cooldown_minutes: 60
  source_classes:
    faq_lexical:
      provenance_label: 'search_api.index.faq_accordion'
      owner_role: 'Content Operations Lead'
      max_age_days: 180
      require_source_url: true
    faq_vector:
      provenance_label: 'search_api.index.faq_accordion_vector'
      owner_role: 'Content Operations Lead'
      max_age_days: 180
      require_source_url: true
    resource_lexical:
      provenance_label: 'search_api.index.assistant_resources'
      owner_role: 'Content Operations Lead'
      max_age_days: 180
      require_source_url: true
    resource_vector:
      provenance_label: 'search_api.index.assistant_resources_vector'
      owner_role: 'Content Operations Lead'
      max_age_days: 180
      require_source_url: true
  freshness_enforcement:
    enabled: true

vector_index_hygiene:
  enabled: true
  policy_version: 'p2_del_03_v1'
  refresh_mode: 'incremental'
  refresh_interval_hours: 24
  probe_interval_hours: 24
  overdue_grace_minutes: 45
  max_items_per_run: 5
  alert_cooldown_minutes: 60
  managed_indexes:
    faq_vector:
      owner_role: 'Content Operations Lead'
      expected_server_id: 'pinecone_vector_faq'
      expected_metric: 'cosine_similarity'
      expected_embeddings_engine: 'ilas_voyage__voyage-law-2'
      expected_dimensions: 1024
      queryability_probes:
        -
          label: 'faq_custody_canary'
          query: 'custody'
          langcode: 'en'
          top_k: 1
          min_results: 1
    resource_vector:
      owner_role: 'Content Operations Lead'
      expected_server_id: 'pinecone_vector_resources'
      expected_metric: 'cosine_similarity'
      expected_embeddings_engine: 'ilas_voyage__voyage-law-2'
      expected_dimensions: 1024
      queryability_probes:
        -
          label: 'resource_eviction_canary'
          query: 'eviction'
          langcode: 'en'
          top_k: 1
          min_results: 1

audit_governance:
  audit_domain_classes:
    - legal_advice
    - document_drafting
    - criminal
    - immigration
    - external
  audit_domain_event_types:
    - safety_violation
    - policy_violation
    - out_of_scope
    - post_gen_safety_legal_advice
    - post_gen_safety_review_flag
    - post_gen_safety_legal_advice_scan
  report_cadence_days: 30
  report_required_permission: 'view ilas site assistant reports'
  signoff_required_permission: 'approve ilas site assistant audit'
  report_retention_days: 365
  signoff_deadline_days: 14

review_loop:
  owner_role: 'Content Manager + SRE/Platform Engineer'
  cadence: 'Weekly'
  scope:
    - 'No-answer and generic-answer trends'
    - 'User feedback satisfaction rate and volume'
    - 'Safety violation counts and post-generation outcomes'
    - 'Top content gaps from no-answer fingerprints'
    - 'Grounding refusal frequency'
  escalation_path: 'Content Manager -> Drupal Lead -> Product Owner'
  artifact_location: 'docs/aila/runtime/phard-05-search-quality-review.txt'

cost_control:
  daily_call_limit: 5000
  monthly_call_limit: 100000
  per_ip_hourly_call_limit: 10
  per_ip_window_seconds: 3600
  sample_rate: 1.0
  cache_hit_rate_target: 0.30
  cache_stats_window_seconds: 86400
  manual_kill_switch: false
  pricing:
    model: 'command-a-03-2025'
    input_per_1m_tokens: 2.50
    output_per_1m_tokens: 10.00
  alert_cooldown_minutes: 60
