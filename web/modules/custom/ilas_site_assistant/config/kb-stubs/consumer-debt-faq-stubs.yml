  - id: faq_debt_dispute
    type: faq_item
    category: Consumer
    anchor_id: how-do-i-dispute-a-debt
    question: "How do I dispute a debt I don't think I owe?"
    answer: |
      If you receive a collection notice for a debt you do not believe you owe,
      you have the right to dispute it:

      1. Send a written dispute letter within 30 days of the collector's first
         notice. State that you dispute the debt and request verification.

      2. Send the letter by certified mail with return receipt so you have proof.

      3. Once the collector receives your dispute, they must stop collection
         until they provide written verification of the debt.

      4. Common reasons to dispute:
         - The debt is not yours (wrong person or identity theft)
         - The amount is wrong
         - You already paid the debt
         - The debt is past the statute of limitations
         - The original creditor never notified you

      5. Check your credit reports for the disputed debt at
         AnnualCreditReport.com (free once per year from each bureau).

      If the collector cannot verify the debt, they must stop trying to collect
      and remove it from your credit report.

      Idaho Legal Aid may help with debt disputes for eligible clients.
    keywords:
