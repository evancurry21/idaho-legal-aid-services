  # ============================================
  # BANKRUPTCY BASICS (Medium Priority)
  # ============================================

  - id: faq_bankruptcy_basics
    type: faq_item
    category: Consumer
    anchor_id: should-i-consider-bankruptcy
    question: "Should I consider bankruptcy?"
    answer: |
      Bankruptcy is a legal process that can help you get a fresh start if
      you are overwhelmed by debt. Here is a general overview:

      Two main types for individuals:

      Chapter 7 (Liquidation):
      - Eliminates most unsecured debts (credit cards, medical bills, personal loans)
      - You must pass a "means test" based on income
      - Usually completed in 3-4 months
      - You may keep exempt property (home equity, car, personal items up to Idaho limits)

      Chapter 13 (Repayment Plan):
      - Sets up a 3-5 year repayment plan based on your income
      - Can help you catch up on mortgage or car payments
      - Stops foreclosure and repossession during the plan
      - Available if you have regular income

      What bankruptcy can do:
      - Stop wage garnishment, lawsuits, and collection calls
      - Eliminate most credit card and medical debt
      - Stop foreclosure temporarily

      What bankruptcy cannot do:
      - Eliminate most student loans
      - Eliminate child support or alimony obligations
      - Eliminate most tax debts
      - Remove liens on secured property

      Important: You must complete credit counseling from an approved agency
      before filing.

      Idaho Legal Aid does not typically file bankruptcy cases directly but
      can provide information and referrals. Contact the Idaho Volunteer
      Lawyers Program for possible pro bono bankruptcy help.
    keywords:
      - bankruptcy
      - file bankruptcy
      - chapter 7
      - chapter 13
      - debt relief
      - fresh start
      - bancarrota
      - quiebra
      - declararse en bancarrota
      - alivio de deuda
    url_destination: /legal-help/consumer
    related_resources:
      - Idaho Volunteer Lawyers Program
