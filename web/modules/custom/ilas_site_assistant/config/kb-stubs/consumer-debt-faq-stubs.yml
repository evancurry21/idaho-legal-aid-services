  # ============================================
  # PREDATORY LENDING (Lower Priority)
  # ============================================

  - id: faq_predatory_lending
    type: faq_item
    category: Consumer
    anchor_id: what-is-predatory-lending
    question: "What is predatory lending and what can I do about it?"
    answer: |
      Predatory lending involves unfair, deceptive, or abusive loan
      practices that take advantage of borrowers. Warning signs include:

      1. Signs of predatory lending:
         - Very high interest rates or fees not clearly disclosed
         - Pressure to sign quickly without time to read the terms
         - Loan terms you did not agree to or that changed at signing
         - Being told not to worry about the fine print
         - Loans that do not consider your ability to repay
         - Repeated refinancing that increases fees (loan flipping)
         - Adding unnecessary products (credit insurance, warranties)

      2. Common predatory loan types:
         - High-cost mortgage loans
         - Auto loans with hidden fees or markups
         - Payday and title loans with extreme interest
         - Rent-to-own contracts with inflated prices
         - Student loan servicing problems

      3. What you can do:
         - File a complaint with the Idaho Department of Finance
         - Report to the Consumer Financial Protection Bureau
         - Contact the Idaho Attorney General Consumer Protection Division
         - Request rescission within 3 days for some home loans (federal
           cooling-off period)

      Idaho Legal Aid may be able to help if you have been a victim of
      predatory lending practices.
