  # ============================================
  # DEBT COLLECTION (High Priority)
  # ============================================

  - id: faq_debt_collection_rights
    type: faq_item
    category: Consumer
    anchor_id: what-are-my-rights-when-a-debt-collector-contacts-me
    question: "What are my rights when a debt collector contacts me?"
    answer: |
      Federal law (the Fair Debt Collection Practices Act, or FDCPA) gives you
      important rights when dealing with debt collectors:

      1. Written validation notice - Within 5 days of first contact, the collector
         must send you a written notice showing the amount owed, the creditor name,
         and your right to dispute the debt.

      2. Right to dispute - You have 30 days to dispute the debt in writing. Once
         you dispute, the collector must stop collection activity until they verify
         the debt.

      3. Limits on contact - Collectors cannot:
         - Call before 8 a.m. or after 9 p.m.
         - Contact you at work if you tell them your employer disapproves
         - Use abusive, threatening, or obscene language
         - Misrepresent the amount you owe
         - Threaten actions they cannot legally take

      4. Right to stop contact - You can send a written "cease communication"
         letter telling the collector to stop contacting you. They may still sue
         you, but they must stop calling and writing.

      If a collector violates these rules, you may have a legal claim against
      them. Keep records of all calls, letters, and messages.

      Idaho Legal Aid may be able to help if you are facing debt collection
      issues and meet income eligibility requirements. Call our Legal Advice
      Line or apply online.
    keywords:
      - debt collector
      - debt collection
      - bill collector
      - collection agency
      - collection calls
