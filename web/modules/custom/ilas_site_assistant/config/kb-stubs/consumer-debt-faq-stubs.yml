  # ============================================
  # REPOSSESSION (Medium Priority)
  # ============================================

  - id: faq_car_repossession
    type: faq_item
    category: Consumer
    anchor_id: what-are-my-rights-if-my-car-is-repossessed
    question: "What are my rights if my car is repossessed?"
    answer: |
      If you fall behind on car payments, the lender may repossess your
      vehicle. In Idaho, here is what you should know:

      1. No "breach of peace" - The repo company cannot use physical force,
         threats, or break into a locked garage to take your car.

      2. Notice requirements - After repossession, the lender must send you
         written notice of:
         - The right to "redeem" (buy back) the vehicle by paying the full
           amount owed
         - The date and location of any sale of the vehicle
         - Your right to any surplus from the sale

      3. Personal property - You have the right to get your personal
         belongings back from the repossessed vehicle.

      4. Deficiency balance - If the car sells for less than what you owe,
         the lender may sue you for the difference ("deficiency"). You can
         challenge this if the sale was not conducted in a "commercially
         reasonable" manner.

      5. Options before repossession:
         - Talk to your lender about modifying payments
         - Voluntarily surrender the vehicle to avoid extra repo fees
         - Consider refinancing

      Idaho Legal Aid may be able to help if your rights were violated during
      repossession or if you are being sued for a deficiency balance.
    keywords:
      - repossession
      - repo
      - car repossessed
      - vehicle repossessed
      - car taken
      - car payment behind
      - reposeido
      - me quitaron el carro
      - embargo del carro
