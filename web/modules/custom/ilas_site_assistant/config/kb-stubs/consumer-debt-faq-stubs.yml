  - id: faq_identity_theft
    type: faq_item
    category: Consumer
    anchor_id: what-do-i-do-if-someone-stole-my-identity
    question: "What do I do if someone stole my identity?"
    answer: |
      If you believe someone is using your personal information without your
      permission, act quickly:

      1. Place a fraud alert - Contact any one of the three credit bureaus
         (Equifax, Experian, TransUnion) to place a free fraud alert. They
         will notify the other two bureaus.

      2. Review your credit reports - Get free reports at
         AnnualCreditReport.com and look for accounts you did not open.

      3. Report to the FTC - Go to IdentityTheft.gov to create a recovery
         plan and get an Identity Theft Report.

      4. File a police report - Bring your FTC Identity Theft Report to your
         local police department.

      5. Close fraudulent accounts - Contact companies where accounts were
         opened in your name and close them.

      6. Consider a credit freeze - A credit freeze prevents new accounts
         from being opened in your name. It is free to place and lift.

      7. Monitor your accounts - Continue checking your credit reports and
         bank statements regularly.

      Idaho Legal Aid may be able to help identity theft victims with legal
      issues that arise, such as disputing debts or clearing records.
