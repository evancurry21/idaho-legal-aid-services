  # ============================================
  # DEBT LAWSUITS (High Priority)
  # ============================================

  - id: faq_debt_lawsuit
    type: faq_item
    category: Consumer
    anchor_id: what-do-i-do-if-im-sued-for-a-debt
    question: "What do I do if I'm sued for a debt?"
    answer: |
      If you receive court papers (a summons and complaint) for a debt, it is
      critical that you respond. Ignoring a lawsuit will result in a default
      judgment against you.

      Steps to take:

      1. Read the papers carefully - Note the deadline to respond. In Idaho,
         you typically have 21 days to file an answer with the court.

      2. Do NOT ignore the lawsuit - If you do not respond, the creditor will
         get a default judgment, which allows them to garnish your wages, take
         money from your bank account, or place a lien on your property.

      3. File an answer - In your answer, you can raise defenses such as:
         - The debt is not yours
         - The amount is wrong
         - The statute of limitations has expired (typically 5 years in Idaho
           for most debts)
         - The creditor does not have proper documentation

      4. Consider your options:
         - Negotiate a settlement or payment plan
         - Raise valid legal defenses
         - Consider bankruptcy if appropriate

      5. Attend all court hearings - If you do not appear, you may lose by default.

      Idaho Legal Aid may be able to help you respond to a debt lawsuit. Call
      our Legal Advice Line immediately if you have received court papers.
    keywords:
      - sued for debt
      - debt lawsuit
      - debt summons
      - court papers debt
      - collection lawsuit
      - default judgment
      - demanda por deuda
