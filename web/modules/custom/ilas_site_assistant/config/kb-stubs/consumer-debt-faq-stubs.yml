  # ============================================
  # SCAMS & FRAUD (High Priority)
  # ============================================

  - id: faq_consumer_scam_recovery
    type: faq_item
    category: Consumer
    anchor_id: what-should-i-do-if-i-was-scammed
    question: "What should I do if I was scammed?"
    answer: |
      If you have been the victim of a scam, take these steps as soon as
      possible:

      1. Stop all contact and payments - Do not send any more money. Block
         the scammer's phone number and email.

      2. Report the scam:
         - Federal Trade Commission (FTC): ReportFraud.ftc.gov
         - Idaho Attorney General Consumer Protection: (208) 334-2424
         - Local law enforcement (file a police report)
         - Your bank or credit card company

      3. Protect your accounts:
         - Change passwords for any accounts the scammer may have accessed
         - Place a fraud alert or credit freeze with all three credit bureaus
         - Monitor your bank and credit card statements

      4. Try to recover your money:
         - If you paid by credit card, dispute the charge with your card company
         - If you paid by debit card, contact your bank immediately
         - If you sent a wire transfer, contact the wire service
         - If you sent gift cards, contact the gift card company

      5. Common scams in Idaho:
         - Phone scams pretending to be the IRS or Social Security
         - Contractor/home repair fraud
         - Online purchase scams
         - Romance scams
         - Utility impersonation scams

      Idaho Legal Aid may be able to help scam victims who meet income
      eligibility requirements.
    keywords:
