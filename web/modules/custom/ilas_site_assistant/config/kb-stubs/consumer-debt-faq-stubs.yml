  # ============================================
  # BANK ACCOUNT LEVY (Medium Priority)
  # ============================================

  - id: faq_bank_account_levy
    type: faq_item
    category: Consumer
    anchor_id: can-a-creditor-take-money-from-my-bank-account
    question: "Can a creditor take money from my bank account?"
    answer: |
      A creditor with a court judgment against you may be able to levy
      (take money from) your bank account. However, certain funds are
      protected:

      Protected funds that cannot be taken:
      - Social Security benefits
      - SSI/SSDI payments
      - Veterans benefits
      - Child support or alimony payments you receive
      - Unemployment compensation
      - Workers' compensation
      - Public assistance (TANF, SNAP cash equivalent)

      What to do if your bank account is levied:

      1. Check if protected funds were taken - If the money came from a
         protected source, file a claim of exemption with the court
         immediately.

      2. Contact your bank - Banks are required to review your account for
         federal benefit deposits and automatically protect two months' worth.

      3. File a claim of exemption - You generally have a limited time
         (often 14 days) to file with the court claiming that the funds
         are exempt.

      4. Attend the hearing - A judge will determine if the funds are
         protected and should be returned to you.

      To protect yourself: Keep benefit funds in a separate account and do
      not mix them with other income.

      Idaho Legal Aid may be able to help you file a claim of exemption.
