  # ============================================
  # MEDICAL DEBT (High Priority)
  # ============================================

  - id: faq_medical_debt
    type: faq_item
    category: Consumer
    anchor_id: what-can-i-do-about-medical-debt
    question: "What can I do about medical debt?"
    answer: |
      Medical debt is the most common type of debt in collections. You have
      rights and options if you are struggling with medical bills:

      1. Review your bills carefully - Request an itemized bill and check for
         errors. Medical billing mistakes are common.

      2. Ask about financial assistance - Most hospitals are required to have
         charity care or financial assistance programs. Ask the billing
         department about these even if you have already received a bill.

      3. Negotiate the bill - You can often negotiate a lower amount or set
         up a payment plan directly with the provider. Many will reduce the
         total if you can pay a lump sum.

      4. Know the protections:
         - Medical debt under $500 cannot appear on your credit report
         - Paid medical debt must be removed from your credit report
         - Medical debt cannot appear on your report until at least one year
           after it was sent to collections
         - You can still dispute medical debt with collectors

      5. Apply for Medicaid - If you are low-income, you may qualify for
         Idaho Medicaid, which can cover some bills retroactively.

      6. Consider bankruptcy - Medical debt can be discharged in bankruptcy
         if you have no other options.

      Idaho Legal Aid may be able to help with medical debt issues for
      eligible clients.
    keywords:
