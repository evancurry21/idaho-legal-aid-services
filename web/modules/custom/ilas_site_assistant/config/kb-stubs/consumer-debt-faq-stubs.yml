  # ============================================
  # CREDIT REPORTS (High Priority)
  # ============================================

  - id: faq_credit_report_errors
    type: faq_item
    category: Consumer
    anchor_id: how-do-i-fix-errors-on-my-credit-report
    question: "How do I fix errors on my credit report?"
    answer: |
      Under the Fair Credit Reporting Act (FCRA), you have the right to dispute
      inaccurate information on your credit report.

      Steps to fix credit report errors:

      1. Get your free reports - You are entitled to one free credit report
         per year from each of the three bureaus (Equifax, Experian, TransUnion)
         at AnnualCreditReport.com.

      2. Identify errors - Common errors include:
         - Accounts that are not yours
         - Wrong balances or payment history
         - Closed accounts reported as open
         - Accounts from identity theft
         - Same debt listed multiple times

      3. File a dispute - Write to the credit bureau reporting the error.
         Include copies of supporting documents. Send by certified mail.

      4. Bureau investigation - The bureau must investigate within 30 days
         and correct or remove inaccurate information.

      5. If the dispute is denied - You can:
         - Add a 100-word statement to your report
         - File a complaint with the Consumer Financial Protection Bureau
         - Contact Idaho Legal Aid for possible legal assistance

      Do NOT pay a company that promises to "fix" your credit. You can dispute
      errors yourself for free.
    keywords:
