  # ============================================
  # PAYDAY LOANS (Medium Priority)
  # ============================================

  - id: faq_payday_loans
    type: faq_item
    category: Consumer
    anchor_id: what-can-i-do-about-payday-loan-debt
    question: "What can I do about payday loan debt?"
    answer: |
      Payday loans carry very high interest rates and fees that can trap
      borrowers in a cycle of debt. Here is what you should know:

      Idaho payday loan laws:
      - Idaho does not cap interest rates on payday loans, so rates can
        exceed 400% APR
      - Lenders must be licensed by the Idaho Department of Finance
      - Loans must include written disclosure of all fees and terms

      Your rights and options:
      1. You can revoke ACH authorization - If you gave the lender
         permission to withdraw from your bank account, you can revoke that
         authorization in writing to your bank.

      2. Extended payment plan - Idaho law requires payday lenders to offer
         a one-time extended payment plan if you cannot repay on time.

      3. You cannot be jailed - It is illegal for a lender to threaten you
         with jail for not paying a payday loan.

      4. Debt collection rules still apply - Payday lenders and their
         collectors must follow the same FDCPA rules as other debt collectors.

      5. Consider alternatives:
         - Community Action Agency emergency assistance
         - Credit union small-dollar loans
         - Negotiate with the lender
         - Credit counseling (nonprofit agencies only)

      Idaho Legal Aid may be able to help if a payday lender has violated
      your rights.
    keywords:
