  # ============================================
  # STATUTE OF LIMITATIONS (Medium Priority)
  # ============================================

  - id: faq_debt_statute_limitations
    type: faq_item
    category: Consumer
    anchor_id: can-a-creditor-still-collect-on-old-debt
    question: "Can a creditor still collect on an old debt?"
    answer: |
      Every type of debt has a time limit for collection called the "statute
      of limitations." After this period expires, a creditor cannot sue you
      to collect the debt (though they may still try to contact you).

      Idaho statutes of limitations for common debts:
      - Written contracts (loans, credit cards): 5 years
      - Oral contracts (verbal agreements): 4 years
      - Promissory notes: 5 years
      - Open accounts (revolving credit): 4 years
      - Judgments: 5 years (but renewable)
      - Medical debt: 5 years

      Important warnings:
      - Making a payment or acknowledging the debt in writing can restart
        the clock on the statute of limitations
      - Even if a debt is too old to sue on, it may still appear on your
        credit report for up to 7 years
      - A creditor can still contact you about old debt; they just cannot
        sue you for it
      - If you are sued on an expired debt, you must raise the statute of
        limitations as a defense in your answer

      Idaho Legal Aid may be able to help you determine whether a debt is
      time-barred.
    keywords:
      - old debt
      - statute of limitations
      - time barred
      - expired debt
      - how old is too old
