      - Consumer Financial Protection Bureau

  # ============================================
  # GARNISHMENT (High Priority)
  # ============================================

  - id: faq_wage_garnishment
    type: faq_item
    category: Consumer
    anchor_id: what-can-i-do-about-wage-garnishment
    question: "What can I do about wage garnishment?"
    answer: |
      Wage garnishment is when a creditor takes money directly from your
      paycheck to pay a debt. In Idaho, a creditor generally needs a court
      judgment before garnishing your wages.

      Key facts about Idaho wage garnishment:

      1. Limits - Federal law limits garnishment to 25% of your disposable
         earnings, or the amount by which your weekly earnings exceed 30 times
         the federal minimum wage, whichever is less.

      2. Exempt income - Some income cannot be garnished:
         - Social Security benefits
         - SSI/SSDI payments
         - Veterans benefits
         - Unemployment benefits
         - Workers' compensation
         - Child support payments you receive

      3. Head of household exemption - Idaho law provides an additional
         exemption if you are the head of household and earn below a
         certain threshold.

      4. What you can do:
         - File a claim of exemption with the court if protected income
           is being garnished
         - Negotiate a payment plan with the creditor
         - Consider whether bankruptcy may be appropriate
         - Check whether the judgment is valid and current

      If your wages are being garnished, act quickly. You generally have a
      limited time to file a claim of exemption. Idaho Legal Aid may be able
      to help you challenge an improper garnishment.
    keywords:
      - garnishment
      - wage garnishment
      - garnished wages
      - paycheck garnished
      - garnish my pay
      - exempt income
      - embargo de sueldo
      - embargo de salario
