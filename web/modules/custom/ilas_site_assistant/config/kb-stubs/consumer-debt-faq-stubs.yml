  # ============================================
  # DEBT AFTER DEATH (Lower Priority)
  # ============================================

  - id: faq_debt_after_death
    type: faq_item
    category: Consumer
    anchor_id: am-i-responsible-for-a-family-members-debt
    question: "Am I responsible for a family member's debt after they die?"
    answer: |
      Generally, you are not personally responsible for a deceased family
      member's debts unless:

      - You co-signed the loan or account
      - You are a joint account holder
      - You are the surviving spouse and community property rules apply
        (Idaho is a community property state)
      - State law requires you to pay certain debts (such as necessary
        medical expenses for a spouse)

      What typically happens:
      1. The deceased person's estate is responsible for paying valid debts
      2. The personal representative (executor) pays debts from estate assets
      3. If the estate does not have enough assets, most debts simply go unpaid
      4. Creditors cannot collect from you personally unless one of the
         exceptions above applies

      Protect yourself:
      - Do not agree to pay a deceased person's debt without consulting
        an attorney first
      - Debt collectors are not allowed to mislead you about your obligation
        to pay someone else's debt
      - Keep records of any collector contacts about a deceased person's debt

      Idaho Legal Aid may be able to help with estate-related debt issues.
    keywords:
