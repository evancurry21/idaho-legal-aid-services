  - id: faq_veterans_services
    type: faq_item
    category: General
    anchor_id: does-idaho-legal-aid-help-veterans
    question: "Does Idaho Legal Aid help veterans?"
    answer: |
      Yes, Idaho Legal Aid provides legal assistance to veterans who meet our
      income eligibility requirements. We can help with many civil legal issues
      including:

      - Housing issues (eviction, foreclosure, landlord disputes)
      - Family law (divorce, custody, protection orders)
      - Consumer issues (debt, scams, identity theft)
      - Public benefits (VA benefits disputes, SNAP, Medicaid)
      - Discharge upgrades (in partnership with pro bono attorneys)

      For VA benefits claims and appeals, we may be able to provide direct
      assistance or refer you to organizations that specialize in veterans benefits:

      - Idaho Division of Veterans Services: (208) 780-1300
      - Veterans Service Organizations (American Legion, VFW, DAV)
      - Idaho Volunteer Lawyers Program

      Veterans facing legal issues should apply for help through our online
      application or call our Legal Advice Line.
    keywords:
      - veteran
      - veterans
      - military
      - VA benefits
      - discharge upgrade
      - veterano
      - militar
    url_destination: /apply-for-help
    related_resources:
      - Idaho Division of Veterans Services
      - VA Regional Office
      - Veterans Service Organizations

  - id: faq_expungement
    type: faq_item
    category: Consumer
    anchor_id: can-i-seal-or-expunge-my-criminal-record
    question: "Can I seal or expunge my criminal record?"
    answer: |
      Idaho law allows for expungement (sealing) of certain criminal records.
      This is a civil process that may be within Idaho Legal Aid's scope.

      Eligible records in Idaho include:
      - Acquittals (found not guilty)
      - Dismissed charges
      - Certain misdemeanor convictions (after 5 years with no new offenses)
      - Juvenile records (in many cases)
      - Withheld judgments (after successful completion)

      Records that generally CANNOT be expunged:
      - Sex offenses
      - Violent felonies
      - DUI/DWI convictions
      - Crimes against children

      The expungement process:
      1. Determine if your record is eligible
      2. File a petition with the court that handled your case
      3. Pay the filing fee (fee waiver may be available)
      4. Attend a hearing if required
      5. If granted, your record is sealed from most background checks

      Note: Even sealed records may still be visible to law enforcement and
      for certain professional licenses.

      Idaho Legal Aid may be able to help with civil expungement cases. For
      active criminal cases, you should contact a criminal defense attorney
      or public defender.
    keywords:
      - expunge
      - expungement
      - seal record
      - clean record
      - background check
      - criminal record
      - borrar record
      - limpiar antecedentes
    url_destination: /legal-help/consumer
    related_resources:
      - Idaho Court Self-Help Center
      - Expungement Forms

