  # ============================================
  # EMPLOYMENT FAQs (High Priority)
  # ============================================

  - id: faq_employment_fired
    type: faq_item
    category: Employment
    anchor_id: what-if-i-was-fired-unfairly
    question: "What if I was fired unfairly?"
    answer: |
      Idaho is an "at-will" employment state, meaning employers can generally
      terminate employees for any reason. However, termination may be wrongful if
      it was based on:

      - Discrimination (race, sex, age, disability, religion, national origin)
      - Retaliation for protected activity (reporting safety violations, filing
        workers' compensation claims, whistleblowing)
      - Violation of an employment contract
      - Violation of public policy

      If you believe you were wrongfully terminated:
      1. Gather documentation of your employment history and the circumstances of your firing
      2. Request your personnel file from your employer
      3. Note any witnesses to discriminatory or retaliatory statements

      You may file a complaint with the Idaho Human Rights Commission (for discrimination)
      or contact Idaho Legal Aid if you meet income eligibility requirements.
    keywords:
      - fired
      - wrongful termination
      - terminated
      - laid off
      - discrimination
      - retaliation
      - despedido
    url_destination: /legal-help/employment
    related_resources:
      - Idaho Human Rights Commission
      - EEOC

  - id: faq_employment_wages
    type: faq_item
    category: Employment
    anchor_id: how-do-i-collect-unpaid-wages
    question: "How do I collect unpaid wages?"
    answer: |
      Idaho law requires employers to pay wages at least monthly on regular paydays
      and to provide final payment by the next regular payday after termination.

      If your employer owes you wages, you have several options:

      1. Request payment in writing - Send a formal written demand to your employer
      2. File a wage claim - Contact the Idaho Department of Labor to file a complaint
      3. Sue in small claims court - For amounts under $5,000, you can file in
         small claims court without an attorney
      4. Consult with a lawyer - For larger amounts or complex situations

      Important: Keep records of all hours worked, pay stubs, and any communication
      with your employer about wages.

      Idaho Legal Aid may be able to help if you meet income eligibility requirements.
    keywords:
      - unpaid wages
      - owed money
      - final paycheck
      - wage theft
      - not getting paid
      - back pay
      - no me pagan
      - salario
    url_destination: /legal-help/employment
    related_resources:
      - Idaho Department of Labor
      - Small Claims Court Guide

  # ============================================
  # UTILITIES FAQ (High Priority)
  # ============================================

  - id: faq_utility_shutoff
    type: faq_item
    category: Consumer
    anchor_id: what-if-my-utilities-are-being-shut-off
    question: "What if my utilities are being shut off?"
    answer: |
      If you receive a utility shutoff notice, take action immediately:

      1. Contact your utility company - Ask about payment plans, budget billing,
         or hardship programs. Many utilities offer assistance programs.

      2. Apply for LIHEAP - The Low Income Home Energy Assistance Program helps
         with heating and cooling costs. Apply through your local Community
         Action Agency.

      3. Check utility company programs:
         - Idaho Power: Project Share, medical certificate exemptions
         - Intermountain Gas: customer assistance programs
         - Most utilities offer payment arrangements

      4. Weather protections - During extreme weather, Idaho utilities may have
         moratoriums on shutoffs for vulnerable customers

      5. Medical exemptions - If someone in your home has a serious medical
         condition, you may qualify for protection from disconnection

      If your utilities are already disconnected, contact your Community Action
      Agency for emergency assistance to get reconnected.

      Idaho Legal Aid may be able to help with utility-related legal issues.
    keywords:
      - utility shutoff
      - power disconnected
      - gas turned off
      - water shut off
      - LIHEAP
      - energy assistance
      - utility bill
      - me cortaron la luz
      - ayuda con facturas
    url_destination: /legal-help/consumer
    related_resources:
      - LIHEAP
      - Community Action Agency
      - Idaho Power Customer Assistance
      - Intermountain Gas Assistance

  # ============================================
  # NAME CHANGE FAQ (Medium Priority)
  # ============================================

  - id: faq_name_change
    type: faq_item
    category: Family
    anchor_id: how-do-i-legally-change-my-name
    question: "How do I legally change my name?"
    answer: |
      In Idaho, you can legally change your name through a court process:

      Steps to change your name:
      1. File a Petition for Name Change in your county's district court
      2. Pay the filing fee (approximately $200 in most counties)
      3. Publish notice in a local newspaper for 4 consecutive weeks
      4. Attend a court hearing where the judge reviews your petition
      5. If approved, receive a court order for name change

      After receiving your court order:
      - Update your Social Security card first
      - Update your driver's license/state ID
      - Update your passport, bank accounts, and other documents

      Special situations:
      - Fee waiver: If you can't afford the filing fee, you can request a fee waiver
      - Minors: Requires both parents' consent or court approval
      - Name change in divorce: Can be included in your divorce decree
      - Gender-related changes: Same process applies

      Idaho Legal Aid may be able to help with name changes in some cases.
    keywords:
      - name change
      - change my name
      - legal name
      - court name change
      - cambiar mi nombre
      - cambio de nombre
    url_destination: /legal-help/family
    related_resources:
      - Idaho Court Self-Help Center
      - Name Change Forms

  # ============================================
  # MOBILE HOME RIGHTS FAQ (Medium Priority)
  # ============================================

  - id: faq_mobile_home_rights
    type: faq_item
    category: Housing
    anchor_id: what-are-my-rights-in-a-mobile-home-park
    question: "What are my rights in a mobile home park?"
    answer: |
      Idaho has specific laws protecting mobile home park residents under the
      Idaho Residential Mobile Home Landlord and Tenant Act (Idaho Code 55-2001 et seq.).

      Key protections:

      1. Eviction protections:
         - Your landlord cannot evict you without proper cause and notice
         - Proper causes include: nonpayment of rent, rule violations,
           park closure, or change in land use
         - You have the right to cure most violations before eviction

      2. Rent and fees:
         - Lot rent cannot be raised without 90 days written notice
         - The park must provide an itemized list of any fees
         - Rent increases must be reasonable and non-discriminatory

      3. Rules and regulations:
         - Park rules must be reasonable and apply equally to all residents
         - You must receive written notice of any rule changes
         - Rules cannot be arbitrary or discriminatory

      4. Right to sell:
         - You have the right to sell your mobile home in place
         - The park cannot unreasonably refuse approval of a buyer
         - The park cannot require you to sell through a specific dealer

      Important: The eviction process for mobile home parks is different from
      regular rental evictions. If you're facing eviction, contact Idaho Legal Aid
      immediately.
    keywords:
      - mobile home
      - manufactured home
      - trailer park
      - lot rent
      - mobile home eviction
      - park rules
      - casa movil
      - parque de trailers
    url_destination: /legal-help/housing
    related_resources:
      - Idaho Mobile Home Tenant Rights Guide
      - Mobile Home Park Eviction Process

