# Acronym / Abbreviation Expansion Map
# Maps common acronyms and abbreviations to canonical terms + primary intent.
# Applied early in the extraction pipeline (before synonym mapping).
#
# Format:
#   ACRONYM:
#     expansion: "canonical phrase"
#     intent: primary_intent_hint (optional, used for routing boost)
#
# Rules:
# - Match is case-insensitive but only on whole-word boundaries
# - Expansion replaces the acronym in the normalized text
# - Intent hint is advisory; IntentRouter still makes final decision

