topic_lexicon:
  modifiers:
    - 'now'
    - 'right'
    - 'asap'
    - 'please'
    - 'urgent'
    - 'quickly'
    - 'immediately'
    - 'today'
    - 'soon'
    - 'fast'
    - 'ahora'
    - 'urgente'
    - 'rapido'
    - 'hoy'
    - 'pronto'
    - 'por'
    - 'favor'
  filler_words:
    - 'case'
    - 'cases'
    - 'issue'
    - 'issues'
    - 'problem'
    - 'problems'
    - 'matter'
    - 'matters'
    - 'tema'
    - 'caso'
    - 'casos'
    - 'problema'
    - 'problemas'
    - 'asunto'
    - 'asuntos'
    - 'legal'
    - 'information'
    - 'informacion'
    - 'info'
  lead_patterns:
    - '/^(?:i\s+need\s+(?:some\s+)?help\s+(?:with|about|on)\s+)/u'
    - '/^(?:need\s+help\s+(?:with|about|on)\s+)/u'
    - '/^(?:help\s+(?:with|about|on)\s+)/u'
    - '/^(?:i\s+(?:need|want)\s+to\s+(?:file\s+for|file|get)\s+(?:a\s+)?)/u'
    - '/^(?:how\s+(?:do|can)\s+i\s+(?:file\s+for|file|get|apply\s+for|apply)\s+(?:a\s+)?)/u'
    - '/^(?:necesito\s+ayuda\s+(?:con|sobre|para)\s+)/u'
    - '/^(?:quiero\s+ayuda\s+(?:con|sobre|para)\s+)/u'
    - '/^(?:ayuda\s+(?:con|sobre|para)\s+)/u'
  topics:
    divorce: { area: family, label: divorce, topic_intent: topic_family_divorce }
    custody: { area: family, label: custody, topic_intent: topic_family_custody }
    'child support': { area: family, label: 'child support', topic_intent: topic_family_child_support }
    visitation: { area: family, label: visitation }
    adoption: { area: family, label: adoption }
    paternity: { area: family, label: paternity }
    divorcio: { area: family, label: divorcio, topic_intent: topic_family_divorce }
    custodia: { area: family, label: custodia, topic_intent: topic_family_custody }
    eviction: { area: housing, label: eviction, topic_intent: topic_housing_eviction }
    landlord: { area: housing, label: 'landlord issues' }
    tenant: { area: housing, label: 'tenant rights' }
    rent: { area: housing, label: 'rent issues' }
    foreclosure: { area: housing, label: foreclosure, topic_intent: topic_housing_foreclosure }
    desalojo: { area: housing, label: desalojo, topic_intent: topic_housing_eviction }
    debt: { area: consumer, label: debt, topic_intent: topic_consumer_debt_collection }
    bankruptcy: { area: consumer, label: bankruptcy, topic_intent: topic_consumer_bankruptcy }
    scam: { area: consumer, label: scam }
