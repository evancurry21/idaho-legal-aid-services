# Topic Map - Maps single tokens and short queries to canonical topic landing pages.
#
# Each topic has:
#   url:       Canonical landing page URL
#   label:     Human-readable label for the topic
#   service_area: The service area key (matches IntentRouter patterns)
#   tokens:    Exact single-token matches (case-insensitive)
#   stems:     Stem roots that catch inflected forms (e.g., "divorc" matches divorce/divorced/divorcing)
#   synonyms:  Common synonyms, slang, and Spanish equivalents
#   phrases:   Short 2-3 word phrases that are topic-specific
#
# Matching priority:
#   1. Exact token match (highest confidence: 0.88)
#   2. Stem match (confidence: 0.85)
#   3. Synonym match (confidence: 0.82)
#   4. Fuzzy match via Levenshtein (confidence: 0.70, max distance 1 for 5-7 char tokens, 2 for 8+)
#   5. Short phrase match (confidence: 0.85)

