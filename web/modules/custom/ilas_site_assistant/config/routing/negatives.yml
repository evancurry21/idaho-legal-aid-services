# Negative Keywords - Terms that should prevent routing to specific intents
# These help reduce false positives and misroutes
# Format: intent -> [negative_keywords]

apply:
  # Don't route to apply if these criminal/out-of-scope terms are present
  negatives:
    - criminal
    - dui
    - dwi
    - felony
    - misdemeanor
    - arrested
    - jail
    - prison
    - immigration
    - visa
    - green card
    - deportation
    - patent
    - trademark
    - copyright
    - business formation
    - incorporation
    - oregon
    - washington state
    - montana
    - nevada
    - utah
    - wyoming

hotline:
  # Don't route to hotline when emergency indicators present
  negatives:
    - 911
    - emergency
    - breaking in
    - right now
    - immediately
    - dying
    - heart attack
    - call police
    # Don't route to hotline when debt collector context present
    # "debt collector keeps calling me" should route to consumer, not hotline
    - debt collector
    - bill collector
    - creditor
    - collection agency
    - collections agency
    - calling me at work
    - calling about debt
    - calling about a bill
    - cobrador
    - cobrador de deudas
    - me llama todos los dias
    - me llaman constantemente

offices:
  # Distinguish office location queries from other location terms
  negatives:
    - court location
    - courtroom
    - jail location
    - prison location

donations:
  # Prevent confusion with other "give" or "support" contexts
  negatives:
    - give up
    - give back custody
    - support order
    - child support
    - spousal support
    - support payment

feedback:
  # Prevent routing feedback when user needs substantive help
  negatives:
    - need help with
    - help me with
    - can you help
    - how do i

forms:
  # Don't route to forms when asking for legal advice about forms
  negatives:
    - fill out for me
    - complete for me
    - draft for me
    - write for me
    - what should i put
    - help me write

guides:
  # Distinguish guide requests from legal advice requests
  negatives:
    - should i
    - what are my chances
    - will i win
    - legal advice
    - tell me what to do

faq:
  # FAQ is for general info, not case-specific questions
  negatives:
    - my case
    - my situation
    - my landlord
    - my spouse
    - my husband
    - my wife
    - my employer

risk_detector:
  # Ensure senior risk detector doesn't capture all senior mentions
  negatives:
    - senior management
    - senior staff
    - senior developer
    - high school senior

services:
  # Don't let services overview capture specific intent queries
  negatives:
    - apply for
    - application
    - sign up
    - forms
    - guides

# Out-of-scope detection - these should route AWAY from standard intents
out_of_scope:
  triggers:
    # Criminal matters
    - criminal defense
    - criminal lawyer
    - criminal case
    - dui
    - dwi
    - felony
    - misdemeanor
    - arrested
    - jail
    - prison
    - public defender
    # Non-Idaho
    - oregon
    - washington state
    - montana
    - nevada
    - utah
    - wyoming
    - california
    - out of state
    # Immigration (if not offered)
    - immigration
    - deportation
    - visa
    - green card
    - asylum
    - citizenship
    - undocumented
    # Business/IP
    - patent
    - trademark
    - copyright
    - start a business
    - incorporate
    - llc formation
    # Emergency override to 911
    - call 911
    - 911
    - breaking in right now
    - someone is dying
    - heart attack
    - being attacked

# High-risk escalation triggers - route to safety resources
high_risk_dv:
  triggers:
    - hitting me
    - hit me
    - hits me
    - beating me
    - beat me
    - abusive
    - abuse
    - domestic violence
    - threatened to kill
    - kill me
    - scared for my life
    - fear for my life
    - afraid for my life
    - restraining order
    - protection order
    - protective order
    # Spanish
    - me pega
    - me golpea
    - abusivo
    - violencia domestica
    - tengo miedo

high_risk_eviction:
  triggers:
    - eviction notice
    - evicted today
    - evicted tomorrow
    - sheriff coming
    - locked out
    - changed locks
    - changed the locks
    - 3 day notice
    - three day notice
    - 5 day notice
    - five day notice
    - court date tomorrow
    - court date this week
    - court date next week
    # Spanish
    - aviso de desalojo
    - me estan echando
    - cambiaron las cerraduras
  # Informational queries about eviction should NOT trigger high_risk
  info_dampeners:
    - form to dismiss
    - dismiss an eviction
    - information on
    - information about
    - legal process of
    - how to evict
    - evict a tenant
    - where can i find
    - what form
    - what is the process

high_risk_scam:
  triggers:
    - identity theft
    - stole my identity
    - stolen identity
    - got scammed
    - been scammed
    - was scammed
    - someone scammed
    - fake contractor
    - social security scam
    - irs scam
    # Spanish
    - robaron mi identidad
    - me estafaron

high_risk_deadline:
  triggers:
    # English - immediate deadlines (today/tomorrow)
    - deadline tomorrow
    - deadline today
    - deadline is today
    - deadline is tomorrow
    - due tomorrow
    - due today
    - response due tomorrow
    - response due today
    - court date tomorrow
    - court date today
    - court hearing tomorrow
    - hearing tomorrow
    - 24 hours
    - within 24 hours
    # English - day-of-week deadlines (Friday/Monday commonly urgent)
    - deadline friday
    - deadline monday
    - deadline is friday
    - deadline is monday
    - deadline this friday
    - deadline this monday
    - due friday
    - due monday
    - due this friday
    - due this monday
    - respond by friday
    - respond by monday
    - respond by tomorrow
    - respond by today
    - file by friday
    - file by monday
    - file by tomorrow
    - paperwork by friday
    - paperwork by monday
    - court date friday
    - court date monday
    - court friday
    - court monday
    - hearing friday
    - hearing monday
    # English - lawsuit/summons response patterns
    - respond to lawsuit
    - respond to summons
    - lawsuit response
    - lawsuit deadline
    - summons deadline
    - answer the lawsuit
    - served papers
    - served with papers
    - got served
    - been served
    - respond to the complaint
    - answer to complaint
    # English - explicit urgency with days
    - by friday
    - by monday
    - by tomorrow
    - by end of week
    - have to file by
    - need to file by
    - must respond by
    - have to respond by
    - need to respond by
    - must file by
    - have to respond today
    - must respond today
    - have to file by tomorrow
    # Spanish - deadlines
    - fecha limite manana
    - fecha limite hoy
    - fecha limite viernes
    - fecha limite lunes
    - vence hoy
    - vence manana
    - vence viernes
    - vence lunes
    - tengo que responder hoy
    - tengo que responder manana
    - tengo que responder
    - me llego una demanda
    - me llegó una demanda
    - recibi una demanda
    - recibí una demanda
    # Spanish - court date patterns
    - corte manana
    - audiencia manana
    - corte hoy
    - audiencia hoy
    - corte viernes
    - corte lunes
    - fecha de corte manana
    - fecha de corte hoy
    - tengo corte manana
    - tengo corte hoy
    - tengo corte
    - tengo una corte
    # Spanglish patterns (mixed English/Spanish)
    - corte date
    - court date manana
    - court manana
  # Informational queries should NOT trigger urgency
  info_dampeners:
    - how long do i have
    - what is the deadline
    - when is the deadline
    - typical deadline
    - general deadline
    - deadline information
    - deadline for eviction

