# High-risk utility triggers (NEW - Coverage Gap Fix)
high_risk_utility:
  triggers:
    - utility shutoff today
    - utility shutoff tomorrow
    - power disconnected today
    - power shutoff notice
    - gas shutoff notice
    - water shutoff today
    - utilities turned off
    - no heat
    - no water
    - freezing
    # Spanish
    - me cortaron la luz hoy
    - van a cortar la luz
    - sin agua
    - sin luz

# Employment-related triggers (NEW - Coverage Gap Fix)
# Note: These are NOT out-of-scope - employment is in ILAS scope
topic_employment:
  triggers:
    - fired
    - wrongful termination
    - wrongfully terminated
    - laid off
    - unpaid wages
    - wage theft
    - not getting paid
    - employer owes me
    - final paycheck
    - work discrimination
    - workplace discrimination
    - hostile work environment
    - retaliation at work
    - sexual harassment work
    # Spanish
    - despedido
    - despedida
    - me despidieron
    - no me pagan
    - salario no pagado
    - discriminacion en el trabajo
    - acoso laboral

# Expungement - ALLOW through (NOT criminal) (NEW - Coverage Gap Fix)
# Expungement is often a civil process in Idaho
expungement_allow:
  # These queries should NOT be blocked by criminal negatives
  allow_through:
    - expunge
    - expungement
    - seal my record
    - seal record
    - clean my record
    - clear my record
    - background check help
    - withheld judgment
    - borrar mi record
    - sellar mi record
    - limpiar antecedentes
