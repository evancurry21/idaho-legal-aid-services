services:
  ilas_site_assistant.access_check.strict_csrf:
    class: Drupal\ilas_site_assistant\Access\StrictCsrfRequestHeaderAccessCheck
    arguments: ['@csrf_token', '@logger.channel.ilas_site_assistant']
    tags:
      - { name: access_check, needs_incoming_request: TRUE }

  cache.ilas_site_assistant:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache_factory:get
    arguments: [ilas_site_assistant]

  ilas_site_assistant.ranking_enhancer:
    class: Drupal\ilas_site_assistant\Service\RankingEnhancer
    arguments: ['@cache.default']

  ilas_site_assistant.acronym_expander:
    class: Drupal\ilas_site_assistant\Service\AcronymExpander
    arguments: ['@cache.default']

  ilas_site_assistant.typo_corrector:
    class: Drupal\ilas_site_assistant\Service\TypoCorrector
    arguments: ['@cache.default', '@ilas_site_assistant.topic_router', '@ilas_site_assistant.acronym_expander']

  ilas_site_assistant.keyword_extractor:
    class: Drupal\ilas_site_assistant\Service\KeywordExtractor
    arguments: ['@cache.default', '@ilas_site_assistant.acronym_expander', '@ilas_site_assistant.typo_corrector']

  ilas_site_assistant.topic_router:
    class: Drupal\ilas_site_assistant\Service\TopicRouter
    arguments: ['@cache.default']

  ilas_site_assistant.navigation_intent:
    class: Drupal\ilas_site_assistant\Service\NavigationIntent

  ilas_site_assistant.intent_router:
    class: Drupal\ilas_site_assistant\Service\IntentRouter
    arguments: ['@config.factory', '@ilas_site_assistant.topic_resolver', '@ilas_site_assistant.keyword_extractor', '@ilas_site_assistant.topic_router', '@ilas_site_assistant.navigation_intent', '@ilas_site_assistant.disambiguator', '@ilas_site_assistant.top_intents_pack']

  ilas_site_assistant.retrieval_configuration:
    class: Drupal\ilas_site_assistant\Service\RetrievalConfigurationService
    arguments: ['@config.factory', '@entity_type.manager']

  ilas_site_assistant.topic_resolver:
    class: Drupal\ilas_site_assistant\Service\TopicResolver
    arguments: ['@entity_type.manager', '@cache.default', '@ilas_site_assistant.retrieval_configuration']

  ilas_site_assistant.faq_index:
    class: Drupal\ilas_site_assistant\Service\FaqIndex
    arguments: ['@entity_type.manager', '@cache.default', '@config.factory', '@language_manager', '@ilas_site_assistant.retrieval_configuration', '@ilas_site_assistant.ranking_enhancer', '@ilas_site_assistant.source_governance']

  ilas_site_assistant.resource_finder:
    class: Drupal\ilas_site_assistant\Service\ResourceFinder
    arguments: ['@entity_type.manager', '@ilas_site_assistant.topic_resolver', '@cache.default', '@language_manager', '@ilas_site_assistant.ranking_enhancer', '@config.factory', '@ilas_site_assistant.retrieval_configuration', '@ilas_site_assistant.source_governance']

  ilas_site_assistant.analytics_logger:
    class: Drupal\ilas_site_assistant\Service\AnalyticsLogger
    arguments: ['@database', '@config.factory', '@datetime.time', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.policy_filter:
    class: Drupal\ilas_site_assistant\Service\PolicyFilter
    arguments: ['@config.factory']

  ilas_site_assistant.environment_detector:
    class: Drupal\ilas_site_assistant\Service\EnvironmentDetector

  ilas_site_assistant.llm_admission_coordinator:
    class: Drupal\ilas_site_assistant\Service\LlmAdmissionCoordinator
    arguments: ['@state', '@config.factory', '@logger.channel.ilas_site_assistant', '@lock']

  ilas_site_assistant.llm_circuit_breaker:
    class: Drupal\ilas_site_assistant\Service\LlmCircuitBreaker
    arguments: ['@state', '@config.factory', '@logger.channel.ilas_site_assistant', '@ilas_site_assistant.llm_admission_coordinator']

  ilas_site_assistant.llm_rate_limiter:
    class: Drupal\ilas_site_assistant\Service\LlmRateLimiter
    arguments: ['@state', '@config.factory', '@logger.channel.ilas_site_assistant', '@ilas_site_assistant.llm_admission_coordinator']

  ilas_site_assistant.cost_control_policy:
    class: Drupal\ilas_site_assistant\Service\CostControlPolicy
    arguments:
      - '@state'
      - '@config.factory'
      - '@logger.channel.ilas_site_assistant'
      - '@ilas_site_assistant.llm_circuit_breaker'
      - '@ilas_site_assistant.llm_rate_limiter'
      - '@ilas_site_assistant.llm_admission_coordinator'

  ilas_site_assistant.llm_enhancer:
    class: Drupal\ilas_site_assistant\Service\LlmEnhancer
    arguments: ['@config.factory', '@http_client', '@logger.factory', '@ilas_site_assistant.policy_filter', '@cache.ilas_site_assistant', '@ilas_site_assistant.llm_circuit_breaker', '@ilas_site_assistant.llm_rate_limiter', '@ilas_site_assistant.cost_control_policy', '@ilas_site_assistant.environment_detector']

  ilas_site_assistant.fallback_gate:
    class: Drupal\ilas_site_assistant\Service\FallbackGate
    arguments: ['@config.factory', '@ilas_site_assistant.environment_detector']

  ilas_site_assistant.request_trust_inspector:
    class: Drupal\ilas_site_assistant\Service\RequestTrustInspector

  ilas_site_assistant.session_bootstrap_guard:
    class: Drupal\ilas_site_assistant\Service\AssistantSessionBootstrapGuard
    arguments: ['@config.factory', '@flood', '@ilas_site_assistant.request_trust_inspector', '@state', '@logger.channel.ilas_site_assistant', '@datetime.time']

  ilas_site_assistant.read_endpoint_guard:
    class: Drupal\ilas_site_assistant\Service\AssistantReadEndpointGuard
    arguments: ['@config.factory', '@flood', '@ilas_site_assistant.request_trust_inspector', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.response_grounder:
    class: Drupal\ilas_site_assistant\Service\ResponseGrounder
    arguments: ['@ilas_site_assistant.source_governance']

  ilas_site_assistant.safety_classifier:
    class: Drupal\ilas_site_assistant\Service\SafetyClassifier
    arguments: ['@config.factory']

  ilas_site_assistant.safety_response_templates:
    class: Drupal\ilas_site_assistant\Service\SafetyResponseTemplates

  ilas_site_assistant.top_intents_pack:
    class: Drupal\ilas_site_assistant\Service\TopIntentsPack
    arguments: ['@cache.default']

  ilas_site_assistant.turn_classifier:
    class: Drupal\ilas_site_assistant\Service\TurnClassifier

  ilas_site_assistant.disambiguator:
    class: Drupal\ilas_site_assistant\Service\Disambiguator

  ilas_site_assistant.out_of_scope_classifier:
    class: Drupal\ilas_site_assistant\Service\OutOfScopeClassifier
    arguments: ['@config.factory']

  ilas_site_assistant.pre_routing_decision_engine:
    class: Drupal\ilas_site_assistant\Service\PreRoutingDecisionEngine
    arguments:
      - '@ilas_site_assistant.policy_filter'
      - '@ilas_site_assistant.safety_classifier'
      - '@ilas_site_assistant.out_of_scope_classifier'

  ilas_site_assistant.out_of_scope_response_templates:
    class: Drupal\ilas_site_assistant\Service\OutOfScopeResponseTemplates

  logger.channel.ilas_site_assistant:
    parent: logger.channel_base
    arguments: ['ilas_site_assistant']

  ilas_site_assistant.performance_monitor:
    class: Drupal\ilas_site_assistant\Service\PerformanceMonitor
    arguments: ['@state', '@logger.channel.ilas_site_assistant', '@ilas_site_assistant.slo_definitions']

  ilas_site_assistant.pii_redactor:
    class: Drupal\ilas_site_assistant\Service\PiiRedactor

  ilas_site_assistant.conversation_logger:
    class: Drupal\ilas_site_assistant\Service\ConversationLogger
    arguments: ['@database', '@config.factory', '@datetime.time', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.safety_violation_tracker:
    class: Drupal\ilas_site_assistant\Service\SafetyViolationTracker
    arguments: ['@state']

  ilas_site_assistant.safety_alert:
    class: Drupal\ilas_site_assistant\Service\SafetyAlertService
    arguments: ['@config.factory', '@database', '@plugin.manager.mail', '@state', '@datetime.time', '@logger.channel.ilas_site_assistant', '@ilas_site_assistant.safety_violation_tracker']

  ilas_site_assistant.ab_testing:
    class: Drupal\ilas_site_assistant\Service\AbTestingService
    arguments: ['@config.factory']

  ilas_site_assistant.langfuse_tracer:
    class: Drupal\ilas_site_assistant\Service\LangfuseTracer
    arguments: ['@config.factory', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.langfuse_terminate_subscriber:
    class: Drupal\ilas_site_assistant\EventSubscriber\LangfuseTerminateSubscriber
    arguments: ['@ilas_site_assistant.langfuse_tracer', '@queue', '@config.factory', '@logger.channel.ilas_site_assistant']
    tags:
      - { name: event_subscriber }

  ilas_site_assistant.slo_definitions:
    class: Drupal\ilas_site_assistant\Service\SloDefinitions
    arguments: ['@config.factory']

  ilas_site_assistant.source_governance:
    class: Drupal\ilas_site_assistant\Service\SourceGovernanceService
    arguments: ['@config.factory', '@state', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.vector_index_hygiene:
    class: Drupal\ilas_site_assistant\Service\VectorIndexHygieneService
    arguments: ['@config.factory', '@state', '@entity_type.manager', '@ilas_site_assistant.retrieval_configuration', '@logger.channel.ilas_site_assistant']

  ilas_site_assistant.cron_health_tracker:
    class: Drupal\ilas_site_assistant\Service\CronHealthTracker
    arguments: ['@state']

  ilas_site_assistant.queue_health_monitor:
    class: Drupal\ilas_site_assistant\Service\QueueHealthMonitor
    arguments: ['@queue', '@state']

  ilas_site_assistant.slo_alert:
    class: Drupal\ilas_site_assistant\Service\SloAlertService
    arguments:
      - '@ilas_site_assistant.slo_definitions'
      - '@logger.channel.ilas_site_assistant'
      - '@state'
      - '@ilas_site_assistant.performance_monitor'
      - '@ilas_site_assistant.cron_health_tracker'
      - '@ilas_site_assistant.queue_health_monitor'

  ilas_site_assistant.csrf_denial_response_subscriber:
    class: Drupal\ilas_site_assistant\EventSubscriber\CsrfDenialResponseSubscriber
    tags:
      - { name: event_subscriber }

  ilas_site_assistant.sentry_options_subscriber:
    class: Drupal\ilas_site_assistant\EventSubscriber\SentryOptionsSubscriber
    tags:
      - { name: event_subscriber }
