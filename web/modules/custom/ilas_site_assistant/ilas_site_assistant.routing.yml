ilas_site_assistant.page:
  path: '/assistant'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantPageController::page'
    _title: 'ILAS Site Assistant'
  requirements:
    _permission: 'access content'

ilas_site_assistant.api.message:
  path: '/assistant/api/message'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::message'
  methods: [POST]
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    _ilas_strict_csrf_token: 'TRUE'

ilas_site_assistant.api.suggest:
  path: '/assistant/api/suggest'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::suggest'
  methods: [GET]
  requirements:
    _permission: 'access content'

ilas_site_assistant.api.faq:
  path: '/assistant/api/faq'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::faq'
  methods: [GET]
  requirements:
    _permission: 'access content'

ilas_site_assistant.admin.settings:
  path: '/admin/config/ilas/site-assistant'
  defaults:
    _form: '\Drupal\ilas_site_assistant\Form\AssistantSettingsForm'
    _title: 'ILAS Site Assistant Settings'
  requirements:
    _permission: 'administer ilas site assistant'

ilas_site_assistant.admin.report:
  path: '/admin/reports/ilas-assistant'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantReportController::report'
    _title: 'ILAS Site Assistant Report'
  requirements:
    _permission: 'view ilas site assistant reports'

ilas_site_assistant.admin.conversations:
  path: '/admin/reports/ilas-assistant/conversations'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantConversationController::list'
    _title: 'Conversation Logs'
  requirements:
    _permission: 'view ilas site assistant conversations'

ilas_site_assistant.admin.conversation_detail:
  path: '/admin/reports/ilas-assistant/conversations/{conversation_id}'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantConversationController::detail'
    _title: 'Conversation Detail'
  requirements:
    _permission: 'view ilas site assistant conversations'
    conversation_id: '[a-f0-9\-]{36}'

ilas_site_assistant.api.health:
  path: '/assistant/api/health'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::health'
  methods: [GET]
  requirements:
    _permission: 'view ilas site assistant reports'

ilas_site_assistant.api.metrics:
  path: '/assistant/api/metrics'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::metrics'
  methods: [GET]
  requirements:
    _permission: 'view ilas site assistant reports'

ilas_site_assistant.api.track:
  path: '/assistant/api/track'
  defaults:
    _controller: '\Drupal\ilas_site_assistant\Controller\AssistantApiController::track'
  methods: [POST]
  requirements:
    _permission: 'access content'
    _csrf_request_header_token: 'TRUE'
    _ilas_strict_csrf_token: 'TRUE'
