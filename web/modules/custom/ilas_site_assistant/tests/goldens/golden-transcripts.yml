  # 17. eviction_forms_no_loop — repeated queries must not crash.
  - id: eviction_forms_no_loop
    label: "Eviction forms repeated query stability"
    turns:
      - message: "eviction forms"
        expected_turn_type: NEW
        expected_intent: ~
        expected_chips_present: true
        notes: "First occurrence — kernel-level no-crash validation."

      - message: "eviction forms"
        expected_turn_type: FOLLOW_UP
