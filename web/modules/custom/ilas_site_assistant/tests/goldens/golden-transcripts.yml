  # 13. Retrospective regression bridge phrases (bundled multi-turn).
  - id: retrospective_rel_bridge
    label: "Retrospective bridge disambiguation/no-loop phrases"
    turns:
      - message: "i need some help"
        expected_turn_type: NEW
        expected_intent: disambiguation
        expected_chips_present: true
        notes: "Vague query triggers Disambiguator with option chips."

      - message: "custody forms?"
        expected_turn_type: FOLLOW_UP
        expected_intent: ~
        expected_chips_present: true
        notes: "Follow-up phrase coverage for retrospective replay set."

      - message: "eviction forms or guides?"
        expected_turn_type: FOLLOW_UP
        expected_intent: ~
        expected_chips_present: false
        notes: "Mixed forms/guides phrase coverage for IMP-REL-03."

      - message: "eviction forms"
        expected_turn_type: FOLLOW_UP
        expected_intent: ~
        expected_chips_present: false
        notes: "Repeated phrase turn 1 for no-loop replay fixture coverage."

      - message: "eviction forms"
        expected_turn_type: FOLLOW_UP
        expected_intent: ~
        expected_chips_present: false
        notes: "Repeated phrase turn 2; loop-break behavior enforced in controller contract tests."

