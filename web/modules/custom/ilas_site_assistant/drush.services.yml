services:
  ilas_site_assistant.commands:
    class: \Drupal\ilas_site_assistant\Commands\KbImportCommands
    arguments: ['@entity_type.manager']
    tags:
      - { name: drush.command }
  ilas_site_assistant.sentry_probe_commands:
    class: \Drupal\ilas_site_assistant\Commands\SentryProbeCommands
    tags:
      - { name: drush.command }
  ilas_site_assistant.langfuse_probe_commands:
    class: \Drupal\ilas_site_assistant\Commands\LangfuseProbeCommands
    arguments: ['@config.factory', '@queue', '@http_client']
    tags:
      - { name: drush.command }
  ilas_site_assistant.disambiguation_review_commands:
    class: \Drupal\ilas_site_assistant\Commands\DisambiguationReviewCommands
    arguments: ['@ilas_site_assistant.analytics_logger']
    tags:
      - { name: drush.command }
