services:
  ilas_payment.processor:
    class: Drupal\ilas_payment\Service\PaymentProcessor
    arguments: ['@logger.factory', '@config.factory', '@http_client', '@messenger', '@ilas_payment.secure_error_handler']
  
  ilas_payment.stripe:
    class: Drupal\ilas_payment\Service\StripePaymentService
    arguments: ['@logger.factory', '@config.factory', '@ilas_payment.processor', '@ilas_payment.secure_key_manager']
  
  ilas_payment.paypal:
    class: Drupal\ilas_payment\Service\PayPalPaymentService
    arguments: ['@logger.factory', '@config.factory', '@ilas_payment.processor']
  
  ilas_payment.acknowledgment:
    class: Drupal\ilas_payment\Service\AcknowledgmentService
    arguments: ['@logger.factory', '@plugin.manager.mail', '@token', '@renderer']
  
  ilas_payment.donation_manager:
    class: Drupal\ilas_payment\Service\DonationManager
    arguments: ['@logger.factory', '@entity_type.manager']
  
  ilas_payment.webhook_access_checker:
    class: Drupal\ilas_payment\Access\WebhookAccessChecker
    arguments: ['@config.factory', '@logger.factory', '@ilas_payment.secure_key_manager']
    tags:
      - { name: access_check, applies_to: _custom_access }
  
  ilas_payment.secure_key_manager:
    class: Drupal\ilas_payment\Service\SecureKeyManager
    arguments: ['@config.factory', '@logger.factory']
  
  ilas_payment.secure_error_handler:
    class: Drupal\ilas_payment\Service\SecureErrorHandler
    arguments: ['@logger.factory', '@config.factory']