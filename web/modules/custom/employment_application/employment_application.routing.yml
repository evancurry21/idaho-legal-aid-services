employment_application.submit:
  path: '/employment-application/submit'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::submitApplication'
  requirements:
    _access: 'TRUE'
    _method: 'POST'
  options:
    _admin_route: FALSE
    no_cache: TRUE
    parameters:
      _disable_route_normalizers: TRUE
    _disable_search_api_indexing: TRUE

employment_application.token:
  path: '/employment-application/token'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::getToken'
  requirements:
    _permission: 'access content'
    _method: 'GET'
  options:
    _admin_route: FALSE
    no_cache: TRUE
    parameters:
      _disable_route_normalizers: TRUE
    _disable_search_api_indexing: TRUE

employment_application.jobs:
  path: '/employment-application/jobs'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::getPostedJobs'
  requirements:
    _access: 'TRUE'
    _method: 'GET'
  options:
    _admin_route: FALSE
    _disable_search_api_indexing: TRUE

employment_application.job:
  path: '/employment-application/jobs/{job_uuid}'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::getJobByUuid'
  requirements:
    _access: 'TRUE'
    _method: 'GET'
    job_uuid: '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
  options:
    _admin_route: FALSE
    _disable_search_api_indexing: TRUE

employment_application.admin:
  path: '/admin/employment-applications'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::adminList'
    _title: 'Employment Applications'
  requirements:
    _permission: 'administer employment applications'
  options:
    _admin_route: TRUE

employment_application.detail:
  path: '/admin/employment-applications/{id}'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::adminDetail'
    _title: 'Application Detail'
  requirements:
    _permission: 'administer employment applications'
    id: \d+
  options:
    _admin_route: TRUE

employment_application.status_update:
  path: '/admin/employment-applications/{id}/status'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::updateStatus'
  requirements:
    _permission: 'administer employment applications'
    _method: 'POST'
    id: \d+
  options:
    _admin_route: TRUE

employment_application.delete:
  path: '/admin/employment-applications/{id}/delete'
  defaults:
    _form: '\Drupal\employment_application\Form\ApplicationDeleteForm'
  requirements:
    _permission: 'administer employment applications'
    id: \d+
  options:
    _admin_route: TRUE

employment_application.download:
  path: '/admin/employment-applications/{id}/download/{fid}'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::downloadFile'
  requirements:
    _permission: 'administer employment applications'
    fid: \d+
    id: \d+
  options:
    _admin_route: TRUE

employment_application.draft_save:
  path: '/employment-application/draft/save'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::saveDraft'
  requirements:
    _access: 'TRUE'
    _method: 'POST'
  options:
    _admin_route: FALSE
    no_cache: TRUE
    _disable_search_api_indexing: TRUE

employment_application.draft_load:
  path: '/employment-application/draft/{token}'
  defaults:
    _controller: '\Drupal\employment_application\Controller\EmploymentApplicationController::loadDraft'
  requirements:
    _access: 'TRUE'
    _method: 'GET'
    token: '[a-f0-9]{64}'
  options:
    _admin_route: FALSE
    no_cache: TRUE
    _disable_search_api_indexing: TRUE
