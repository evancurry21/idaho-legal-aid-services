    label: 'Title'
    datasource_id: 'entity:node'
    property_path: title
    type: text
    boost: 5.0
  body:
    label: 'Main Content'
    datasource_id: 'entity:node'
    property_path: field_main_content
    type: text
    boost: 2.0
  topic_names:
    label: 'Topic Names'
    datasource_id: 'entity:node'
    property_path: 'field_topics:entity:name'
    type: text
    boost: 3.0
  service_area_names:
    label: 'Service Area Names'
    datasource_id: 'entity:node'
    property_path: 'field_service_areas:entity:name'
    type: text
    boost: 1.5
  status:
    label: 'Published'
    datasource_id: 'entity:node'
    property_path: status
    type: boolean
datasource_settings:
  'entity:node':
    bundles:
      default: false
      selected:
        - resource
    languages:
      default: true
      selected: {  }
processor_settings:
  add_url: {  }
  entity_status: {  }
  html_filter:
    weights:
      preprocess_index: -15
      preprocess_query: -15
    all_fields: false
    fields:
      - body
    title: true
    alt: true
    tags:
      b: 2
      strong: 2
  ignorecase:
    weights:
      preprocess_index: -20
      preprocess_query: -20
    all_fields: false
    fields:
      - title
      - body
      - topic_names
      - service_area_names
  stemmer:
