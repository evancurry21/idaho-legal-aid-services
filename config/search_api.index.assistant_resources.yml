      preprocess_index: 0
      preprocess_query: 0
    all_fields: false
    fields:
      - title
      - body
      - topic_names
      - service_area_names
    exceptions: {  }
  tokenizer:
    weights:
      preprocess_index: -6
      preprocess_query: -6
    all_fields: false
    fields:
      - title
      - body
      - topic_names
      - service_area_names
    spaces: ''
    ignored: ._-
    overlap_cjk: 1
    minimum_word_size: '3'
tracker_settings:
  default:
    indexing_order: lifo
options:
  cron_limit: 50
  index_directly: true
  track_changes_in_references: true
  delete_on_fail: true
