id: employment_application
title: 'Employment Application'
description: ''
categories: {  }
elements: |-
  page_1:
    '#type': webform_wizard_page
    '#title': 'Personal Information'
    intro:
      '#type': webform_markup
      '#markup': '<div class="application-intro"><h2>Personal Information</h2><p>Let''s start with your basic information. We''ll use this to contact you about your application.</p></div>'
    full_name:
      '#type': textfield
      '#title': 'Full Name'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    email:
      '#type': email
      '#title': 'Email Address'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    phone:
      '#type': tel
      '#title': 'Phone Number'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-input
    address:
      '#type': webform_address
      '#title': Address
      '#required': true
  page_2:
    '#type': webform_wizard_page
    '#title': 'Position Details'
    position_intro:
      '#type': webform_markup
      '#markup': '<div class="application-intro"><h2>Position Details</h2><p>Tell us about the position you''re interested in and your availability.</p></div>'
    position_applied:
      '#type': select
      '#title': 'Position Applied For'
      '#required': true
      '#options':
        managing_attorney: 'Managing Attorney'
        staff_attorney: 'Staff Attorney'
        paralegal: 'Paralegal'
        legal_assistant: 'Legal Assistant'
        administrative: 'Administrative Support'
        outreach: 'Community Outreach'
        other: Other
      '#attributes':
        class:
          - form-select
          - custom-select
    position_other:
      '#type': textfield
      '#title': 'If Other, please specify'
      '#states':
        visible:
          ':input[name="position_applied"]':
            value: other
    available_start_date:
      '#type': date
      '#title': 'Earliest Available Start Date'
      '#required': true
      '#attributes':
        class:
          - form-control
          - custom-date
    salary_requirements:
      '#type': textfield
      '#title': 'Salary Requirements'
      '#attributes':
        class:
          - form-control
          - custom-input
  page_3:
    '#type': webform_wizard_page
    '#title': 'Experience & Education'
    experience_intro:
      '#type': webform_markup
      '#markup': '<div class="application-intro"><h2>Experience & Education</h2><p>Share your background and qualifications with us.</p></div>'
    work_experience:
      '#type': webform_multiple
      '#title': 'Work Experience'
      '#button_add_label': 'Add Another Work Experience'
      '#add': 2
      '#cardinality': 5
      '#sorting': false
      '#operations': false
      '#element':
        '#type': container
        employer:
          '#type': textfield
          '#title': Employer
          '#required': true
          '#attributes':
            class:
              - form-control
              - custom-input
        job_title:
          '#type': textfield
          '#title': 'Job Title'
          '#required': true
          '#attributes':
            class:
              - form-control
              - custom-input
        start_date:
          '#type': date
          '#title': 'Start Date'
          '#required': true
          '#attributes':
            class:
              - form-control
              - custom-date
        end_date:
          '#type': date
          '#title': 'End Date'
          '#attributes':
            class:
              - form-control
              - custom-date
        current_position:
          '#type': checkbox
          '#title': 'I currently work here'
          '#attributes':
            class:
              - form-check-input
              - custom-checkbox
        responsibilities:
          '#type': textarea
          '#title': 'Key Responsibilities'
          '#attributes':
            class:
              - form-control
              - custom-textarea
    education:
      '#type': webform_multiple
      '#title': Education
      '#button_add_label': 'Add Another Education Entry'
      '#add': 2
      '#cardinality': 5
      '#sorting': false
      '#operations': false
      '#element':
        '#type': container
        institution:
          '#type': textfield
          '#title': Institution
          '#attributes':
            class:
              - form-control
              - custom-input
        degree:
          '#type': textfield
          '#title': Degree/Certificate
          '#attributes':
            class:
              - form-control
              - custom-input
        graduation_date:
          '#type': date
          '#title': 'Graduation Date'
          '#attributes':
            class:
              - form-control
              - custom-date
  page_4:
    '#type': webform_wizard_page
    '#title': 'Documents'
    files_intro:
      '#type': webform_markup
      '#markup': '<div class="application-intro"><h2>Documents</h2><p>Upload your resume and any additional documents that showcase your qualifications.</p></div>'
    resume:
      '#type': managed_file
      '#title': Resume
      '#required': true
      '#multiple': false
      '#file_extensions': 'pdf doc docx'
      '#max_filesize': 5MB
      '#description': 'Upload your resume (PDF, DOC, or DOCX format, max 5MB)'
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
    cover_letter:
      '#type': managed_file
      '#title': 'Cover Letter'
      '#multiple': false
      '#file_extensions': 'pdf doc docx'
      '#max_filesize': 5MB
      '#description': 'Upload your cover letter (PDF, DOC, or DOCX format, max 5MB)'
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
    additional_documents:
      '#type': managed_file
      '#title': 'Additional Documents'
      '#multiple': true
      '#file_extensions': 'pdf doc docx jpg jpeg png'
      '#max_filesize': 10MB
      '#description': 'Upload any additional documents (certifications, portfolios, etc.)'
      '#max_items': 3
      '#uri_scheme': private
      '#file_private': true
      '#attributes':
        class:
          - custom-file-upload
  page_5:
    '#type': webform_wizard_page
    '#title': 'Additional Information'
    additional_intro:
      '#type': webform_markup
      '#markup': '<div class="application-intro"><h2>Additional Information</h2><p>Tell us a bit more about yourself and how you heard about us.</p></div>'
    referral_source:
      '#type': select
      '#title': 'How did you hear about us?'
      '#options':
        company_website: 'Company Website'
        job_board: 'Job Board'
        social_media: 'Social Media'
        employee_referral: 'Employee Referral'
        other: Other
      '#attributes':
        class:
          - form-select
          - custom-select
    referral_details:
      '#type': textfield
      '#title': 'Please provide details'
      '#states':
        visible:
          ':input[name="referral_source"]':
            '!value': company_website
      '#attributes':
        class:
          - form-control
          - custom-input
    additional_comments:
      '#type': textarea
      '#title': 'Additional Comments'
      '#attributes':
        class:
          - form-control
          - custom-textarea
    agreement:
      '#type': checkbox
      '#title': 'I certify that the information provided in this application is true and complete to the best of my knowledge.'
      '#required': true
      '#required_error': 'You must agree to this statement to submit your application.'
      '#attributes':
        class:
          - form-check-input
          - consent-checkbox
      '#wrapper_attributes':
        class:
          - application-agreement
