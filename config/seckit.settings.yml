  noscript_message: 'Sorry, you need to enable JavaScript to visit this website.'
  x_frame: '1'
  x_frame_allow_from: ''
# NOTE: Pantheon's edge/CDN layer adds a duplicate HSTS header (max-age=300).
# This cannot be suppressed from the application layer. SecKit's stronger header
# (max-age=31536000) is intentionally kept. Contact Pantheon support to request
# they either suppress their HSTS or increase its max-age to match.
# See: Finding H-5 in security audit (Feb 2026).
seckit_ssl:
  hsts: true
  hsts_subdomains: true
  hsts_max_age: 31536000
  hsts_preload: true
seckit_ct:
  expect_ct: false
  max_age: 86400
  report_uri: ''
  enforce: false
seckit_fp:
  feature_policy: false
  feature_policy_policy: ''
seckit_various:
  from_origin: false
  from_origin_destination: same
  referrer_policy: true
  referrer_policy_policy: strict-origin-when-cross-origin
  disable_autocomplete: false
