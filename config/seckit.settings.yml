_core:
  default_config_hash: zzgpgFFYVnDh4Bu8k2ZNyNtoVeOOmmjTKvv41SWyRXo
seckit_xss:
  csp:
    checkbox: true
    vendor-prefix:
      x: false
      webkit: false
    report-only: true
    default-src: "'self'"
    script-src: "'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://js.stripe.com https://donorbox.org"
    object-src: "'none'"
    style-src: "'self' 'unsafe-inline' https://fonts.googleapis.com"
    img-src: "'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com"
    media-src: "'self'"
    frame-src: "'self' https://js.stripe.com https://donorbox.org https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com"
    frame-ancestors: "'self'"
    child-src: "'self'"
    font-src: "'self' https://fonts.gstatic.com"
    connect-src: "'self' https://api.stripe.com https://www.google-analytics.com"
    report-uri: /report-csp-violation
    upgrade-req: true
    policy-uri: ''
  x_xss:
    select: 2
seckit_csrf:
  origin: false
  origin_whitelist: ''
seckit_clickjacking:
  js_css_noscript: false
  noscript_message: 'Sorry, you need to enable JavaScript to visit this website.'
  x_frame: '1'
  x_frame_allow_from: ''
seckit_ssl:
  hsts: true
  hsts_subdomains: true
  hsts_max_age: 31536000
  hsts_preload: true
seckit_ct:
  expect_ct: false
  max_age: 86400
  report_uri: ''
  enforce: false
seckit_fp:
  feature_policy: false
  feature_policy_policy: ''
seckit_various:
  from_origin: false
  from_origin_destination: same
  referrer_policy: false
  referrer_policy_policy: no-referrer-when-downgrade
  disable_autocomplete: false
